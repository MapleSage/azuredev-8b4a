# secret rotation assessment, and replacement with Workload Identity-based manifests.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sageinsure-backend
  namespace: sageinsure-agents
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sageinsure-backend
  template:
    metadata:
      labels:
        app: sageinsure-backend
    spec:
      containers:
      - name: backend
        image: sageinsureacr1758906383.azurecr.io/sageinsure-backend:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: sageinsure-backend-service
  namespace: sageinsure-agents
spec:
  selector:
    app: sageinsure-backend
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP