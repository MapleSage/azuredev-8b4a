# Horizontal Pod Autoscaler configurations for SageInsure applications
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sageinsure-api-hpa
  namespace: default
  labels:
    app.kubernetes.io/name: sageinsure-api
    app.kubernetes.io/part-of: sageinsure
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sageinsure-api
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "100"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 4
          periodSeconds: 60
      selectPolicy: Max

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sageinsure-frontend-hpa
  namespace: default
  labels:
    app.kubernetes.io/name: sageinsure-frontend
    app.kubernetes.io/part-of: sageinsure
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sageinsure-frontend
  minReplicas: 2
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 85
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sageinsure-worker-hpa
  namespace: default
  labels:
    app.kubernetes.io/name: sageinsure-worker
    app.kubernetes.io/part-of: sageinsure
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sageinsure-worker
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 85
    - type: Object
      object:
        metric:
          name: redis_queue_length
        describedObject:
          apiVersion: v1
          kind: Service
          name: redis
        target:
          type: Value
          value: "50"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600 # Longer stabilization for workers
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 30 # Quick scale up for queue processing
      policies:
        - type: Pods
          value: 3
          periodSeconds: 60
      selectPolicy: Max
