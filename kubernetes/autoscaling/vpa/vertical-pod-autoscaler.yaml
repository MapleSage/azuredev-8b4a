# Vertical Pod Autoscaler configurations for SageInsure
# Automatically adjusts resource requests and limits

# VPA for SageInsure API
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: sageinsure-api-vpa
  namespace: default
  labels:
    app.kubernetes.io/name: sageinsure-api
    app.kubernetes.io/part-of: sageinsure
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sageinsure-api
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: sageinsure-api
        minAllowed:
          cpu: 100m
          memory: 128Mi
        maxAllowed:
          cpu: 2000m
          memory: 4Gi
        controlledResources: ["cpu", "memory"]
        controlledValues: RequestsAndLimits

---
# VPA for SageInsure Frontend
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: sageinsure-frontend-vpa
  namespace: default
  labels:
    app.kubernetes.io/name: sageinsure-frontend
    app.kubernetes.io/part-of: sageinsure
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sageinsure-frontend
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: sageinsure-frontend
        minAllowed:
          cpu: 50m
          memory: 64Mi
        maxAllowed:
          cpu: 1000m
          memory: 2Gi
        controlledResources: ["cpu", "memory"]
        controlledValues: RequestsAndLimits

---
# VPA for SageInsure Worker
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: sageinsure-worker-vpa
  namespace: default
  labels:
    app.kubernetes.io/name: sageinsure-worker
    app.kubernetes.io/part-of: sageinsure
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sageinsure-worker
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: sageinsure-worker
        minAllowed:
          cpu: 200m
          memory: 256Mi
        maxAllowed:
          cpu: 4000m
          memory: 8Gi
        controlledResources: ["cpu", "memory"]
        controlledValues: RequestsAndLimits
