# Horizontal Pod Autoscaler configurations for SageInsure
# Automatically scales pods based on CPU, memory, and custom metrics

# HPA for SageInsure API
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sageinsure-api-hpa
  namespace: default
  labels:
    app.kubernetes.io/name: sageinsure-api
    app.kubernetes.io/part-of: sageinsure
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sageinsure-api
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "100"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 4
          periodSeconds: 60
      selectPolicy: Max

---
# HPA for SageInsure Frontend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sageinsure-frontend-hpa
  namespace: default
  labels:
    app.kubernetes.io/name: sageinsure-frontend
    app.kubernetes.io/part-of: sageinsure
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sageinsure-frontend
  minReplicas: 2
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
---
# HPA for SageInsure Worker
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sageinsure-worker-hpa
  namespace: default
  labels:
    app.kubernetes.io/name: sageinsure-worker
    app.kubernetes.io/part-of: sageinsure
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sageinsure-worker
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 85
    - type: Pods
      pods:
        metric:
          name: queue_size
        target:
          type: AverageValue
          averageValue: "10"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600 # Longer stabilization for batch jobs
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60

---
# Custom Metrics HPA for Business Logic
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sageinsure-api-business-metrics-hpa
  namespace: default
  labels:
    app.kubernetes.io/name: sageinsure-api
    app.kubernetes.io/part-of: sageinsure
    scaling-type: business-metrics
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sageinsure-api
  minReplicas: 2
  maxReplicas: 25
  metrics:
    - type: Pods
      pods:
        metric:
          name: insurance_quotes_per_minute
        target:
          type: AverageValue
          averageValue: "50"
    - type: Pods
      pods:
        metric:
          name: policy_processing_queue_length
        target:
          type: AverageValue
          averageValue: "5"
    - type: Object
      object:
        metric:
          name: active_user_sessions
        target:
          type: Value
          value: "1000"
        describedObject:
          apiVersion: v1
          kind: Service
          name: sageinsure-api
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 200
          periodSeconds: 30
