apiVersion: apps/v1
kind: Deployment
metadata:
  name: sageinsure-api
  namespace: staging
  labels:
    app.kubernetes.io/name: sageinsure-api
    app.kubernetes.io/part-of: sageinsure
    environment: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sageinsure-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sageinsure-api
        app.kubernetes.io/part-of: sageinsure
        environment: staging
    spec:
      containers:
        - name: api
          image: python:3.11-slim
          command: ["/bin/sh"]
          args:
            - "-c"
            - |
              mkdir -p /tmp/health
              echo '{"status":"healthy","environment":"staging","timestamp":"'$(date -Iseconds)'"}' > /tmp/health/health
              cd /tmp && python -m http.server 8080
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ENVIRONMENT
              value: "staging"
            - name: PORT
              value: "8080"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
