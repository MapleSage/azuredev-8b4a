# Persistent Volume Backup Configuration
# Automated backup of critical persistent data

apiVersion: batch/v1
kind: CronJob
metadata:
  name: pv-backup-job
  namespace: default
  labels:
    app.kubernetes.io/name: pv-backup
    app.kubernetes.io/part-of: sageinsure
spec:
  schedule: "0 0 * * *" # Daily at midnight
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: pv-backup
            app.kubernetes.io/part-of: sageinsure
        spec:
          serviceAccountName: pv-backup-sa
          restartPolicy: OnFailure
          containers:
            - name: pv-backup
              image: mcr.microsoft.com/azure-cli:latest
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  echo "Starting PV backup process..."

                  # Get list of PVCs to backup
                  PVCS=$(kubectl get pvc -o jsonpath='{.items[*].metadata.name}')

                  for pvc in $PVCS; do
                    echo "Backing up PVC: $pvc"
                    
                    # Get PV name
                    PV=$(kubectl get pvc $pvc -o jsonpath='{.spec.volumeName}')
                    
                    # Create snapshot using Azure CLI
                    DISK_ID=$(kubectl get pv $PV -o jsonpath='{.spec.csi.volumeHandle}')
                    SNAPSHOT_NAME="$pvc-$(date +%Y%m%d-%H%M%S)"
                    
                    az snapshot create \
                      --resource-group sageinsure-rg \
                      --source "$DISK_ID" \
                      --name "$SNAPSHOT_NAME" \
                      --tags "backup-type=automated" "pvc=$pvc" "date=$(date +%Y-%m-%d)"
                    
                    echo "Created snapshot: $SNAPSHOT_NAME for PVC: $pvc"
                  done

                  # Cleanup old snapshots (keep last 7 days)
                  echo "Cleaning up old snapshots..."
                  CUTOFF_DATE=$(date -d '7 days ago' +%Y-%m-%d)

                  OLD_SNAPSHOTS=$(az snapshot list \
                    --resource-group sageinsure-rg \
                    --query "[?tags.\"backup-type\"=='automated' && tags.date<'$CUTOFF_DATE'].name" \
                    --output tsv)

                  for snapshot in $OLD_SNAPSHOTS; do
                    echo "Deleting old snapshot: $snapshot"
                    az snapshot delete --resource-group sageinsure-rg --name "$snapshot"
                  done

                  echo "PV backup process completed"
              env:
                - name: AZURE_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: azure-credentials
                      key: client-id
                - name: AZURE_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: azure-credentials
                      key: client-secret
                - name: AZURE_TENANT_ID
                  valueFrom:
                    secretKeyRef:
                      name: azure-credentials
                      key: tenant-id
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi

---
# Service Account for PV Backup
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pv-backup-sa
  namespace: default
  annotations:
    azure.workload.identity/client-id: "" # To be populated by Terraform
  labels:
    app.kubernetes.io/name: pv-backup
    app.kubernetes.io/part-of: sageinsure

---
# Role for PV Backup
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: default
  name: pv-backup-role
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims", "persistentvolumes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create"]

---
# RoleBinding for PV Backup
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pv-backup-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: pv-backup-sa
    namespace: default
roleRef:
  kind: Role
  name: pv-backup-role
  apiGroup: rbac.authorization.k8s.io
