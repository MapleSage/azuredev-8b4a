# External Secrets Operator configuration for Azure Key Vault integration
# Automatically syncs secrets from Azure Key Vault to Kubernetes

apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
  labels:
    name: external-secrets
    app.kubernetes.io/part-of: sageinsure

---
# SecretStore for Azure Key Vault
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: azure-keyvault-store
  namespace: default
  labels:
    app.kubernetes.io/part-of: sageinsure
spec:
  provider:
    azurekv:
      vaultUrl: "https://kv-eedfa81f.vault.azure.net/"
      authType: WorkloadIdentity
      serviceAccountRef:
        name: sageinsure-api-sa
      tenantId: "{{ .Values.azure.tenantId }}"

---
# ClusterSecretStore for cross-namespace access
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: azure-keyvault-cluster-store
  labels:
    app.kubernetes.io/part-of: sageinsure
spec:
  provider:
    azurekv:
      vaultUrl: "https://kv-eedfa81f.vault.azure.net/"
      authType: WorkloadIdentity
      serviceAccountRef:
        name: sageinsure-api-sa
        namespace: default
      tenantId: "{{ .Values.azure.tenantId }}"

---
# ExternalSecret for API secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sageinsure-api-secrets
  namespace: default
  labels:
    app.kubernetes.io/name: sageinsure-api
    app.kubernetes.io/part-of: sageinsure
spec:
  secretStoreRef:
    name: azure-keyvault-store
    kind: SecretStore
  target:
    name: sageinsure-api-secrets
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: sageinsure-api
          app.kubernetes.io/part-of: sageinsure
        annotations:
          reloader.stakater.com/match: "true"
  data:
    - secretKey: openai-api-key
      remoteRef:
        key: openai-api-key
    - secretKey: azure-search-key
      remoteRef:
        key: azure-search-key
    - secretKey: database-connection-string
      remoteRef:
        key: database-connection-string
    - secretKey: jwt-secret-key
      remoteRef:
        key: jwt-secret-key
  refreshInterval: 1h

---
# ExternalSecret for worker secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sageinsure-worker-secrets
  namespace: default
  labels:
    app.kubernetes.io/name: sageinsure-worker
    app.kubernetes.io/part-of: sageinsure
spec:
  secretStoreRef:
    name: azure-keyvault-store
    kind: SecretStore
  target:
    name: sageinsure-worker-secrets
    creationPolicy: Owner
  data:
    - secretKey: openai-api-key
      remoteRef:
        key: openai-api-key
    - secretKey: azure-search-key
      remoteRef:
        key: azure-search-key
    - secretKey: storage-account-key
      remoteRef:
        key: storage-account-key
  refreshInterval: 1h
