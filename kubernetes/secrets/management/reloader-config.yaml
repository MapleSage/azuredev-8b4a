# Reloader configuration for zero-downtime secret updates
# Automatically restarts pods when secrets are updated

apiVersion: v1
kind: Namespace
metadata:
  name: reloader
  labels:
    name: reloader
    app.kubernetes.io/part-of: sageinsure

---
# Reloader Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reloader
  namespace: reloader
  labels:
    app: reloader
    app.kubernetes.io/name: reloader
    app.kubernetes.io/part-of: sageinsure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reloader
  template:
    metadata:
      labels:
        app: reloader
    spec:
      serviceAccountName: reloader
      containers:
        - name: reloader
          image: stakater/reloader:v1.0.69
          ports:
            - containerPort: 9090
              name: http-metrics
          env:
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop:
                - ALL

---
# Service Account for Reloader
apiVersion: v1
kind: ServiceAccount
metadata:
  name: reloader
  namespace: reloader
  labels:
    app: reloader
    app.kubernetes.io/name: reloader
    app.kubernetes.io/part-of: sageinsure

---
# ClusterRole for Reloader
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: reloader
  labels:
    app: reloader
    app.kubernetes.io/name: reloader
    app.kubernetes.io/part-of: sageinsure
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["extensions"]
    resources: ["deployments", "daemonsets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create"]

---
# ClusterRoleBinding for Reloader
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: reloader
  labels:
    app: reloader
    app.kubernetes.io/name: reloader
    app.kubernetes.io/part-of: sageinsure
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: reloader
subjects:
  - kind: ServiceAccount
    name: reloader
    namespace: reloader

---
# Service for Reloader metrics
apiVersion: v1
kind: Service
metadata:
  name: reloader
  namespace: reloader
  labels:
    app: reloader
    app.kubernetes.io/name: reloader
    app.kubernetes.io/part-of: sageinsure
spec:
  ports:
    - name: http-metrics
      port: 9090
      targetPort: 9090
  selector:
    app: reloader

---
# ServiceMonitor for Reloader metrics
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: reloader-metrics
  namespace: monitoring
  labels:
    app: reloader
    prometheus: kube-prometheus
spec:
  selector:
    matchLabels:
      app: reloader
  endpoints:
    - port: http-metrics
      path: /metrics
      interval: 30s
  namespaceSelector:
    matchNames:
      - reloader
