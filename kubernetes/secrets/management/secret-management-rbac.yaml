# RBAC for Secret Management and Rotation
# Provides necessary permissions for secret rotation and validation

# Service Account for Secret Rotation
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-rotation-sa
  namespace: default
  annotations:
    azure.workload.identity/client-id: "" # To be populated by Terraform
  labels:
    app.kubernetes.io/name: secret-rotation
    app.kubernetes.io/part-of: sageinsure

---
# Service Account for Secret Validation
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-validation-sa
  namespace: default
  labels:
    app.kubernetes.io/name: secret-validation
    app.kubernetes.io/part-of: sageinsure

---
# Role for Secret Rotation
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: default
  name: secret-rotation-role
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["external-secrets.io"]
    resources: ["externalsecrets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create"]

---
# Role for Secret Validation
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: default
  name: secret-validation-role
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["external-secrets.io"]
    resources: ["externalsecrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create"]

---
# RoleBinding for Secret Rotation
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secret-rotation-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: secret-rotation-sa
    namespace: default
roleRef:
  kind: Role
  name: secret-rotation-role
  apiGroup: rbac.authorization.k8s.io

---
# RoleBinding for Secret Validation
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secret-validation-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: secret-validation-sa
    namespace: default
roleRef:
  kind: Role
  name: secret-validation-role
  apiGroup: rbac.authorization.k8s.io

---
# ClusterRole for External Secrets Operator
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-secrets-controller
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["external-secrets.io"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

---
# ClusterRoleBinding for External Secrets Operator
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-secrets-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: external-secrets-controller
subjects:
  - kind: ServiceAccount
    name: external-secrets
    namespace: external-secrets
