# Secret Rotation CronJobs for automated secret management
# Handles periodic secret rotation and validation

apiVersion: batch/v1
kind: CronJob
metadata:
  name: secret-rotation-job
  namespace: default
  labels:
    app.kubernetes.io/name: secret-rotation
    app.kubernetes.io/part-of: sageinsure
spec:
  schedule: "0 2 * * 0" # Weekly on Sunday at 2 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: secret-rotation
            app.kubernetes.io/part-of: sageinsure
        spec:
          serviceAccountName: secret-rotation-sa
          restartPolicy: OnFailure
          containers:
            - name: secret-rotator
              image: mcr.microsoft.com/azure-cli:latest
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  echo "Starting secret rotation process..."

                  # Check secret expiration dates
                  echo "Checking secret expiration dates..."

                  # Rotate JWT secret if needed (every 90 days)
                  JWT_SECRET_AGE=$(kubectl get secret sageinsure-api-secrets -o jsonpath='{.metadata.creationTimestamp}' | xargs -I {} date -d {} +%s)
                  CURRENT_TIME=$(date +%s)
                  AGE_DAYS=$(( (CURRENT_TIME - JWT_SECRET_AGE) / 86400 ))

                  if [ $AGE_DAYS -gt 90 ]; then
                    echo "JWT secret is $AGE_DAYS days old, rotating..."
                    NEW_JWT_SECRET=$(openssl rand -base64 32)
                    az keyvault secret set --vault-name kv-eedfa81f --name jwt-secret-key --value "$NEW_JWT_SECRET"
                    echo "JWT secret rotated successfully"
                  else
                    echo "JWT secret is $AGE_DAYS days old, no rotation needed"
                  fi

                  # Trigger External Secrets refresh
                  kubectl annotate externalsecret sageinsure-api-secrets force-sync="$(date +%s)" --overwrite
                  kubectl annotate externalsecret sageinsure-worker-secrets force-sync="$(date +%s)" --overwrite

                  echo "Secret rotation process completed"
              env:
                - name: AZURE_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: azure-credentials
                      key: client-id
                - name: AZURE_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: azure-credentials
                      key: client-secret
                - name: AZURE_TENANT_ID
                  valueFrom:
                    secretKeyRef:
                      name: azure-credentials
                      key: tenant-id
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi

---
# Secret validation CronJob
apiVersion: batch/v1
kind: CronJob
metadata:
  name: secret-validation-job
  namespace: default
  labels:
    app.kubernetes.io/name: secret-validation
    app.kubernetes.io/part-of: sageinsure
spec:
  schedule: "0 */6 * * *" # Every 6 hours
  concurrencyPolicy: Allow
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: secret-validation
            app.kubernetes.io/part-of: sageinsure
        spec:
          serviceAccountName: secret-validation-sa
          restartPolicy: OnFailure
          containers:
            - name: secret-validator
              image: curlimages/curl:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "Starting secret validation process..."

                  # Validate API secrets exist
                  if kubectl get secret sageinsure-api-secrets; then
                    echo "✅ API secrets exist"
                  else
                    echo "❌ API secrets missing"
                    exit 1
                  fi

                  # Validate worker secrets exist
                  if kubectl get secret sageinsure-worker-secrets; then
                    echo "✅ Worker secrets exist"
                  else
                    echo "❌ Worker secrets missing"
                    exit 1
                  fi

                  # Check External Secrets sync status
                  API_SECRET_STATUS=$(kubectl get externalsecret sageinsure-api-secrets -o jsonpath='{.status.conditions[0].status}')
                  WORKER_SECRET_STATUS=$(kubectl get externalsecret sageinsure-worker-secrets -o jsonpath='{.status.conditions[0].status}')

                  if [ "$API_SECRET_STATUS" = "True" ]; then
                    echo "✅ API External Secret sync successful"
                  else
                    echo "❌ API External Secret sync failed"
                    exit 1
                  fi

                  if [ "$WORKER_SECRET_STATUS" = "True" ]; then
                    echo "✅ Worker External Secret sync successful"
                  else
                    echo "❌ Worker External Secret sync failed"
                    exit 1
                  fi

                  echo "Secret validation completed successfully"
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
