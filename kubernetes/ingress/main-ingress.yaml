apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sageinsure-main-ingress
  namespace: default
  annotations:
    # NGINX Ingress Controller
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # TLS Configuration
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # Rate Limiting
    nginx.ingress.kubernetes.io/rate-limit-connections: "10"
    nginx.ingress.kubernetes.io/rate-limit-requests-per-minute: "300"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"

    # Security Headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.sageinsure.local;";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload";

    # Performance
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "300"

    # Compression
    nginx.ingress.kubernetes.io/enable-compression: "true"
    nginx.ingress.kubernetes.io/compression-level: "6"
    nginx.ingress.kubernetes.io/compression-types: "text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript"

spec:
  tls:
    - hosts:
        - sageinsure.local
        - api.sageinsure.local
        - grafana.sageinsure.local
      secretName: sageinsure-tls-cert
  rules:
    # Frontend - Main application
    - host: sageinsure.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sageinsure-frontend
                port:
                  number: 80

    # API Backend
    - host: api.sageinsure.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sageinsure-api
                port:
                  number: 80

    # Grafana Monitoring Dashboard
    - host: grafana.sageinsure.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus-stack-grafana
                port:
                  number: 80
