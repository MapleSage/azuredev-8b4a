apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-rate-limiting-config
  namespace: ingress-nginx
data:
  # Global rate limiting configuration
  rate-limit-requests-per-minute: "300"
  rate-limit-connections: "10"
  rate-limit-window: "1m"

  # API specific rate limiting
  api-rate-limit-requests-per-minute: "100"
  api-rate-limit-connections: "5"

  # Static assets rate limiting (more permissive)
  static-rate-limit-requests-per-minute: "1000"
  static-rate-limit-connections: "20"

  # Rate limiting zones
  limit-req-zone-api: "$binary_remote_addr zone=api:10m rate=100r/m"
  limit-req-zone-static: "$binary_remote_addr zone=static:10m rate=1000r/m"
  limit-req-zone-default: "$binary_remote_addr zone=default:10m rate=300r/m"

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sageinsure-api-rate-limited
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # Stricter rate limiting for API endpoints
    nginx.ingress.kubernetes.io/rate-limit-connections: "5"
    nginx.ingress.kubernetes.io/rate-limit-requests-per-minute: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"

    # API-specific security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-API-Version: v1";
      more_set_headers "X-Rate-Limit-Remaining: $rate_limit_remaining";
      more_set_headers "X-Rate-Limit-Limit: 100";
      more_set_headers "X-Rate-Limit-Window: 60";

      # CORS headers for API
      if ($request_method = 'OPTIONS') {
        more_set_headers "Access-Control-Allow-Origin: https://sageinsure.local";
        more_set_headers "Access-Control-Allow-Methods: GET, POST, PUT, DELETE, OPTIONS";
        more_set_headers "Access-Control-Allow-Headers: DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
        more_set_headers "Access-Control-Max-Age: 1728000";
        more_set_headers "Content-Type: text/plain; charset=utf-8";
        more_set_headers "Content-Length: 0";
        return 204;
      }

      more_set_headers "Access-Control-Allow-Origin: https://sageinsure.local";
      more_set_headers "Access-Control-Allow-Credentials: true";

spec:
  tls:
    - hosts:
        - api.sageinsure.local
      secretName: sageinsure-api-tls-cert
  rules:
    - host: api.sageinsure.local
      http:
        paths:
          # Health check endpoints (no rate limiting)
          - path: /health
            pathType: Exact
            backend:
              service:
                name: sageinsure-api
                port:
                  number: 80
          - path: /ready
            pathType: Exact
            backend:
              service:
                name: sageinsure-api
                port:
                  number: 80

          # API endpoints (rate limited)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: sageinsure-api
                port:
                  number: 80

          # Documentation endpoints
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: sageinsure-api
                port:
                  number: 80
