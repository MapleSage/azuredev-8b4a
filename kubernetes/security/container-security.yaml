# Container Security Configurations
apiVersion: v1
kind: ConfigMap
metadata:
  name: security-scanning-config
  namespace: default
  labels:
    app.kubernetes.io/part-of: sageinsure
data:
  trivy-config.yaml: |
    # Trivy security scanner configuration
    severity:
      - CRITICAL
      - HIGH
      - MEDIUM
    ignore-unfixed: true
    format: json
    exit-code: 1

  falco-rules.yaml: |
    # Custom Falco rules for SageInsure
    - rule: Detect crypto mining
      desc: Detect cryptocurrency mining
      condition: spawned_process and proc.name in (crypto_miners)
      output: "Crypto mining detected (user=%user.name command=%proc.cmdline)"
      priority: WARNING
      
    - rule: Unexpected network tool in container
      desc: Detect network tools in containers
      condition: spawned_process and container and proc.name in (network_tools)
      output: "Network tool launched in container (user=%user.name command=%proc.cmdline container=%container.id)"
      priority: WARNING

---
# Pod Security Policy (for clusters that still support it)
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: sageinsure-restricted-psp
  annotations:
    seccomp.security.alpha.kubernetes.io/allowedProfileNames: "runtime/default"
    seccomp.security.alpha.kubernetes.io/defaultProfileName: "runtime/default"
spec:
  privileged: false
  allowPrivilegeEscalation: false
  requiredDropCapabilities:
    - ALL
  volumes:
    - "configMap"
    - "emptyDir"
    - "projected"
    - "secret"
    - "downwardAPI"
    - "persistentVolumeClaim"
    - "csi"
  hostNetwork: false
  hostIPC: false
  hostPID: false
  runAsUser:
    rule: "MustRunAsNonRoot"
  supplementalGroups:
    rule: "MustRunAs"
    ranges:
      - min: 1000
        max: 65535
  fsGroup:
    rule: "MustRunAs"
    ranges:
      - min: 1000
        max: 65535
  readOnlyRootFilesystem: true

---
# Security Context Constraints for OpenShift (if applicable)
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: sageinsure-restricted-scc
  annotations:
    kubernetes.io/description: "Restricted security context constraints for SageInsure"
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegedContainer: false
allowedCapabilities: []
defaultAddCapabilities: []
requiredDropCapabilities:
  - ALL
fsGroup:
  type: MustRunAs
  ranges:
    - min: 1000
      max: 65535
readOnlyRootFilesystem: true
runAsUser:
  type: MustRunAsNonRoot
seLinuxContext:
  type: MustRunAs
supplementalGroups:
  type: MustRunAs
  ranges:
    - min: 1000
      max: 65535
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret
  - csi
users:
  - system:serviceaccount:default:sageinsure-api-sa
  - system:serviceaccount:default:sageinsure-frontend-sa
  - system:serviceaccount:default:sageinsure-worker-sa

---
# Image Security Policy using OPA Gatekeeper
apiVersion: templates.gatekeeper.sh/v1beta1
kind: ConstraintTemplate
metadata:
  name: k8srequiretrustedimages
  annotations:
    description: "Requires images to be from trusted registries"
spec:
  crd:
    spec:
      names:
        kind: K8sRequireTrustedImages
      validation:
        type: object
        properties:
          allowedRegistries:
            type: array
            items:
              type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequiretrustedimages

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          image := container.image
          not starts_with_allowed_registry(image)
          msg := sprintf("Image %v is not from a trusted registry", [image])
        }

        starts_with_allowed_registry(image) {
          allowed_registries := input.parameters.allowedRegistries
          startswith(image, allowed_registries[_])
        }

---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequireTrustedImages
metadata:
  name: sageinsure-trusted-images
spec:
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment"]
    labelSelector:
      matchLabels:
        app.kubernetes.io/part-of: sageinsure
  parameters:
    allowedRegistries:
      - "sageinsureacr.azurecr.io/"
      - "mcr.microsoft.com/"
      - "docker.io/library/"
