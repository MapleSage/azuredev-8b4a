# RBAC Configuration for SageInsure Applications
# Implements least-privilege access control

# Service Account for API
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sageinsure-api-sa
  namespace: default
  annotations:
    azure.workload.identity/client-id: "" # To be populated by Terraform
  labels:
    app.kubernetes.io/name: sageinsure-api
    app.kubernetes.io/part-of: sageinsure
automountServiceAccountToken: false

---
# Service Account for Frontend
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sageinsure-frontend-sa
  namespace: default
  annotations:
    azure.workload.identity/client-id: "" # To be populated by Terraform
  labels:
    app.kubernetes.io/name: sageinsure-frontend
    app.kubernetes.io/part-of: sageinsure
automountServiceAccountToken: false

---
# Service Account for Worker
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sageinsure-worker-sa
  namespace: default
  annotations:
    azure.workload.identity/client-id: "" # To be populated by Terraform
  labels:
    app.kubernetes.io/name: sageinsure-worker
    app.kubernetes.io/part-of: sageinsure
automountServiceAccountToken: false

---
# Role for API - minimal permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: default
  name: sageinsure-api-role
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
    resourceNames: ["sageinsure-api-config", "sageinsure-api-secrets"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
    resourceNames: ["sageinsure-api-*"]

---
# Role for Worker - batch job permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: default
  name: sageinsure-worker-role
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
    resourceNames: ["sageinsure-worker-config", "sageinsure-worker-secrets"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
# RoleBinding for API
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sageinsure-api-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: sageinsure-api-sa
    namespace: default
roleRef:
  kind: Role
  name: sageinsure-api-role
  apiGroup: rbac.authorization.k8s.io

---
# RoleBinding for Worker
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sageinsure-worker-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: sageinsure-worker-sa
    namespace: default
roleRef:
  kind: Role
  name: sageinsure-worker-role
  apiGroup: rbac.authorization.k8s.io

---
# ClusterRole for monitoring access (read-only)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sageinsure-monitoring-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]

---
# ClusterRoleBinding for monitoring
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sageinsure-monitoring-binding
subjects:
  - kind: ServiceAccount
    name: prometheus-operator
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: sageinsure-monitoring-reader
  apiGroup: rbac.authorization.k8s.io
