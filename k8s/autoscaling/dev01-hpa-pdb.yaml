apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sageinfra-agentcore
  namespace: sageinfra-new-agents
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sageinfra-agentcore
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sageinfra-agentcore
  namespace: sageinfra-new-agents
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sageinfra-agentcore
---
