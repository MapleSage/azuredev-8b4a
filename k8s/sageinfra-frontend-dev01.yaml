apiVersion: v1
kind: ConfigMap
metadata:
  name: sageinfra-frontend-caddy
  namespace: sageinfra-new-agents
  labels:
    app.kubernetes.io/name: sageinfra-frontend
    app.kubernetes.io/part-of: sageinfra
    app.kubernetes.io/environment: dev01
data:
  Caddyfile: |
    {
      email admin@sagesure.io
    }

    dev.sagesure.io {
      encode gzip
      reverse_proxy 127.0.0.1:3000
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sageinfra-frontend
  namespace: sageinfra-new-agents
  labels:
    app.kubernetes.io/name: sageinfra-frontend
    app.kubernetes.io/part-of: sageinfra
    app.kubernetes.io/environment: dev01
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: sageinfra-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sageinfra-frontend
        app.kubernetes.io/part-of: sageinfra
        app.kubernetes.io/environment: dev01
    spec:
      nodeSelector:
        workload: sageinfra
      volumes:
        - name: caddy-config
          configMap:
            name: sageinfra-frontend-caddy
        - name: caddy-data
          emptyDir: {}
        - name: caddy-state
          emptyDir: {}
      containers:
        - name: caddy
          image: caddy:2.8-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: caddy-http
              containerPort: 80
            - name: caddy-https
              containerPort: 443
          volumeMounts:
            - name: caddy-config
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
              readOnly: true
            - name: caddy-data
              mountPath: /data
            - name: caddy-state
              mountPath: /config
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 96Mi
        - name: sageinfra-frontend
          image: sageinfranewdev01.azurecr.io/sageinfra-frontend:dev01
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: SAGEINFRA_AGENTCORE_URL
              value: http://sageinfra-agentcore
            - name: AGENTCORE_CHAT_TIMEOUT_MS
              value: "45000"
            - name: NEXT_PUBLIC_DEVELOPMENT_MODE
              value: "false"
            - name: NEXT_PUBLIC_DISABLE_AUTH
              value: "false"
            - name: NEXT_PUBLIC_AUTH_CONFIGURED
              value: "true"
            - name: NEXT_PUBLIC_REDIRECT_URI
              value: "https://dev.sagesure.io/auth/callback"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sageinfra-frontend
  namespace: sageinfra-new-agents
  labels:
    app.kubernetes.io/name: sageinfra-frontend
    app.kubernetes.io/part-of: sageinfra
    app.kubernetes.io/environment: dev01
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: sageinfra-frontend
  ports:
    - name: http
      port: 80
      targetPort: caddy-http
    - name: https
      port: 443
      targetPort: caddy-https
