apiVersion: v1
kind: ServiceAccount
metadata:
  name: sageinsure-workload-identity
  namespace: sageinsure
  annotations:
    azure.workload.identity/client-id: "27650c1d-91fa-4747-a2fa-1a52813ac5ac"
  labels:
    azure.workload.identity/use: "true"
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: sageinsure-secrets
  namespace: sageinsure
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    userAssignedIdentityID: "27650c1d-91fa-4747-a2fa-1a52813ac5ac"
    keyvaultName: "kv-sageretailjssso"
    tenantId: "e9394f90-446d-41dd-8c8c-98ac08c5f090"
    objects: |
      array:
        - |
          objectName: azure-client-secret
          objectType: secret
          objectVersion: ""
        - |
          objectName: azure-openai-key
          objectType: secret
          objectVersion: ""
        - |
          objectName: azure-openai-endpoint
          objectType: secret
          objectVersion: ""
  secretObjects:
    - secretName: msal-secrets
      type: Opaque
      data:
        - objectName: azure-client-secret
          key: AZURE_CLIENT_SECRET
        - objectName: azure-openai-key
          key: AZURE_OPENAI_API_KEY
        - objectName: azure-openai-endpoint
          key: AZURE_OPENAI_ENDPOINT
---
apiVersion: v1
kind: Secret
metadata:
  name: msal-config
  namespace: sageinsure
type: Opaque
stringData:
  AZURE_TENANT_ID: "e9394f90-446d-41dd-8c8c-98ac08c5f090"
  AZURE_CLIENT_ID: "27650c1d-91fa-4747-a2fa-1a52813ac5ac"
  AZURE_KEY_VAULT_URL: "https://kv-sageretailjssso.vault.azure.net/"
  ENVIRONMENT: "production"
  CORS_ORIGINS: "https://sageinsure.com,https://api.sageinsure.com"
  PORT: "8000"
