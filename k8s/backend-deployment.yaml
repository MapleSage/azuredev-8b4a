apiVersion: apps/v1
kind: Deployment
metadata:
  name: sageinsure-backend
  namespace: sageinsure
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sageinsure-backend
  template:
    metadata:
      labels:
        app: sageinsure-backend
    spec:
      containers:
        - name: backend
          image: python:3.11-slim
          ports:
            - containerPort: 8000
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: AZURE_TENANT_ID
              value: "e9394f90-446d-41dd-8c8c-98ac08c5f090"
            - name: AZURE_CLIENT_ID
              value: "27650c1d-91fa-4747-a2fa-1a52813ac5ac"
            - name: AZURE_CLIENT_SECRET
              value: "2nr8Q~uTHkYXbWglQm80ibOlqo-K6N2Ew5g6VacZ"
            - name: AZURE_OPENAI_ENDPOINT
              value: "https://parvinddutta-9607-ai.openai.azure.com/"
            - name: AZURE_OPENAI_API_KEY
              value: "172068a0b5a348efa948c8339cca0329"
            - name: AZURE_OPENAI_DEPLOYMENT
              value: "gpt-4o"
            - name: PORT
              value: "8000"
            - name: CORS_ORIGINS
              value: "http://localhost:3000"
          command: ["/bin/bash"]
          args:
            - -c
            - |
              apt-get update && apt-get install -y git curl
              pip install fastapi uvicorn httpx pydantic python-dotenv
              cat > app.py << 'EOF'
              from fastapi import FastAPI, HTTPException, Depends, Header
              from fastapi.middleware.cors import CORSMiddleware
              from pydantic import BaseModel
              import os
              from datetime import datetime
              from typing import List, Optional, Dict, Any
              import logging
              import httpx
              import json
              import asyncio

              logging.basicConfig(level=logging.INFO)
              logger = logging.getLogger(__name__)

              app = FastAPI(title="SageInsure AI API", version="3.0.0")

              # CORS configuration
              allowed_origins = [
                  "http://localhost:3000",
                  "https://calm-pond-0b4024e0f-preview.eastus2.1.azurestaticapps.net",
                  "https://sageinsure-clean.azurestaticapps.net"
              ]

              app.add_middleware(
                  CORSMiddleware,
                  allow_origins=allowed_origins,
                  allow_credentials=True,
                  allow_methods=["*"],
                  allow_headers=["*"],
              )

              # Azure OpenAI Configuration
              # Azure OpenAI Configuration (fallback to intelligent responses)
              AZURE_OPENAI_ENDPOINT = os.getenv("AZURE_OPENAI_ENDPOINT", "")
              AZURE_OPENAI_API_KEY = os.getenv("AZURE_OPENAI_API_KEY", "")
              AZURE_OPENAI_DEPLOYMENT = os.getenv("AZURE_OPENAI_DEPLOYMENT", "gpt-4o")
              API_VERSION = "2024-02-15-preview"

              class ChatRequest(BaseModel):
                  text: str
                  conversationId: str = "session"
                  specialist: str = "GENERAL"
                  context: List[dict] = []

              class ChatResponse(BaseModel):
                  response: str
                  agent: str
                  specialist: str
                  confidence: float
                  status: str
                  conversationId: str
                  timestamp: str

              class InsuranceAgent:
                  def __init__(self):
                      self.system_prompts = {
                          "GENERAL": """You are SageInsure AI, a knowledgeable insurance assistant. You help customers with:
              - Policy information and coverage details
              - Claims processing and status updates
              - Premium calculations and payment options
              - Risk assessment and recommendations
              - Insurance product comparisons
              - Regulatory compliance questions

              Provide accurate, helpful, and professional responses. If you're unsure about specific policy details, recommend contacting their agent.""",
                          
                          "CLAIMS": """You are a Claims Specialist AI for SageInsure. You specialize in:
              - Claims filing procedures and requirements
              - Documentation needed for different claim types
              - Claims status tracking and updates
              - Settlement processes and timelines
              - Dispute resolution procedures
              - Fraud detection indicators

              Be empathetic when dealing with claims, as customers may be stressed. Provide clear, step-by-step guidance.""",
                          
                          "UNDERWRITING": """You are an Underwriting Specialist AI for SageInsure. You focus on:
              - Risk assessment and evaluation
              - Policy pricing and premium calculations
              - Coverage recommendations based on risk profiles
              - Underwriting guidelines and criteria
              - Application review processes
              - Risk mitigation strategies

              Provide detailed analysis while explaining complex underwriting concepts in simple terms.""",
                          
                          "POLICY": """You are a Policy Specialist AI for SageInsure. You help with:
              - Policy terms and conditions explanations
              - Coverage limits and deductibles
              - Policy modifications and endorsements
              - Renewal processes and options
              - Beneficiary and coverage changes
              - Policy cancellation procedures

              Ensure customers understand their policy details and options clearly."""
                      }

                  async def get_ai_response(self, message: str, specialist: str, context: List[dict] = None) -> Dict[str, Any]:
                      # Try Azure OpenAI first, fallback to intelligent responses
                      if AZURE_OPENAI_ENDPOINT and AZURE_OPENAI_API_KEY:
                          try:
                              system_prompt = self.system_prompts.get(specialist, self.system_prompts["GENERAL"])
                              
                              messages = [{"role": "system", "content": system_prompt}]
                              
                              if context:
                                  for ctx in context[-5:]:
                                      if ctx.get("role") and ctx.get("content"):
                                          messages.append(ctx)
                              
                              messages.append({"role": "user", "content": message})
                              
                              headers = {
                                  "Content-Type": "application/json",
                                  "api-key": AZURE_OPENAI_API_KEY
                              }
                              
                              payload = {
                                  "messages": messages,
                                  "temperature": 0.7,
                                  "max_tokens": 800,
                                  "top_p": 0.9,
                                  "frequency_penalty": 0,
                                  "presence_penalty": 0
                              }
                              
                              url = f"{AZURE_OPENAI_ENDPOINT}openai/deployments/{AZURE_OPENAI_DEPLOYMENT}/chat/completions?api-version={API_VERSION}"
                              
                              async with httpx.AsyncClient(timeout=10.0) as client:
                                  response = await client.post(url, headers=headers, json=payload)
                                  
                                  if response.status_code == 200:
                                      result = response.json()
                                      ai_response = result["choices"][0]["message"]["content"]
                                      
                                      return {
                                          "response": ai_response,
                                          "status": "success",
                                          "confidence": 0.95,
                                          "usage": result.get("usage", {})
                                      }
                          except Exception as e:
                              logger.warning(f"Azure OpenAI unavailable, using fallback: {str(e)}")
                      
                      # Fallback to intelligent responses
                      return self.get_intelligent_response(message, specialist)
                  
                  def get_intelligent_response(self, message: str, specialist: str) -> Dict[str, Any]:
                      message_lower = message.lower()
                      
                      # Insurance product inquiries
                      if any(word in message_lower for word in ["types", "products", "offer", "insurance", "coverage"]):
                          return {
                              "response": """At SageInsure, we offer comprehensive insurance solutions including:

              🏠 **Home Insurance** - Protect your property and belongings
              🚗 **Auto Insurance** - Complete vehicle coverage with competitive rates  
              💼 **Business Insurance** - Commercial liability and property protection
              ❤️ **Life Insurance** - Term and whole life policies
              🏥 **Health Insurance** - Medical and dental coverage options
              ✈️ **Travel Insurance** - Protection for your trips and vacations

              Each policy can be customized to meet your specific needs and budget. Would you like detailed information about any particular type of coverage?""",
                              "status": "success",
                              "confidence": 0.9
                          }
                      
                      # Claims related
                      elif any(word in message_lower for word in ["claim", "accident", "damage", "file", "report"]):
                          return {
                              "response": """I can help you with your insurance claim. Here's what you need to know:

              📋 **Filing a Claim:**
              1. Report the incident immediately (24/7 hotline: 1-800-SAGE-INS)
              2. Document everything with photos and detailed notes
              3. Gather all relevant documents (police reports, receipts, etc.)
              4. Complete our online claim form or call our claims department

              ⏱️ **Processing Time:** Most claims are processed within 5-10 business days
              📱 **Track Status:** Use our mobile app or online portal to monitor progress
              💬 **Support:** Dedicated claims adjuster assigned to your case

              What type of claim do you need to file? I can provide specific guidance based on your situation.""",
                              "status": "success",
                              "confidence": 0.9
                          }
                      
                      # Pricing and quotes
                      elif any(word in message_lower for word in ["price", "cost", "quote", "premium", "rate", "cheap", "affordable"]):
                          return {
                              "response": """I'd be happy to help you understand our competitive pricing:

              💰 **Factors Affecting Your Premium:**
              - Coverage type and limits
              - Your location and risk factors
              - Claims history and credit score
              - Deductible amount chosen

              🎯 **Money-Saving Tips:**
              - Bundle multiple policies for discounts up to 25%
              - Maintain a clean driving/claims record
              - Install security systems (home) or safety features (auto)
              - Consider higher deductibles for lower premiums

              📊 **Get Your Free Quote:**
              I can connect you with our quote system or an agent who can provide personalized pricing based on your specific needs. 

              What type of insurance are you looking to quote?""",
                              "status": "success",
                              "confidence": 0.9
                          }
                      
                      # Policy information
                      elif any(word in message_lower for word in ["policy", "coverage", "deductible", "limit", "terms"]):
                          return {
                              "response": """Let me explain key policy concepts:

              📄 **Policy Components:**
              - **Premium:** Amount you pay for coverage (monthly/annually)
              - **Deductible:** What you pay before insurance kicks in
              - **Coverage Limits:** Maximum amount we'll pay for claims
              - **Exclusions:** What's not covered (clearly listed in your policy)

              🔍 **Understanding Your Coverage:**
              - Liability: Protects against claims from others
              - Comprehensive: Covers damage from non-collision events
              - Collision: Covers vehicle damage from accidents
              - Personal Property: Covers your belongings

              📋 **Policy Management:**
              - Make changes online or by calling customer service
              - Set up automatic payments for convenience
              - Review coverage annually to ensure adequate protection

              Do you have questions about a specific aspect of your policy or coverage?""",
                              "status": "success",
                              "confidence": 0.9
                          }
                      
                      # General greeting or help
                      elif any(word in message_lower for word in ["hello", "hi", "help", "assist", "support"]):
                          return {
                              "response": """Hello! Welcome to SageInsure AI Assistant. I'm here to help you with all your insurance needs.

              🤖 **I can assist you with:**
              - Insurance product information and quotes
              - Claims filing and status updates  
              - Policy questions and coverage explanations
              - Payment and billing inquiries
              - Finding local agents and offices

              💬 **How to get the best help:**
              - Be specific about what you need
              - Mention your policy type if you're a current customer
              - Let me know if you're shopping for new coverage

              What can I help you with today?""",
                              "status": "success",
                              "confidence": 0.9
                          }
                      
                      # Default intelligent response
                      else:
                          return {
                              "response": f"""Thank you for your question about "{message}". 

              As your SageInsure AI assistant, I'm here to provide comprehensive insurance guidance. While I work on understanding your specific inquiry, here are some ways I can help:

              🔍 **Immediate Assistance:**
              - Get instant quotes for any insurance type
              - File or check status of claims 24/7
              - Explain policy terms and coverage options
              - Connect you with local licensed agents

              📞 **Need Human Support?**
              - Customer Service: 1-800-SAGE-INS
              - Claims Hotline: 1-800-CLAIM-NOW  
              - Online Chat: Available on our website

              Could you please rephrase your question or let me know specifically what type of insurance information you're looking for? I'm here to help make insurance simple and accessible.""",
                              "status": "success",
                              "confidence": 0.8
                          }

              # Initialize the insurance agent
              insurance_agent = InsuranceAgent()

              @app.get("/")
              async def health_check():
                  return {
                      "status": "SageInsure AI API Running",
                      "version": "3.0.0",
                      "timestamp": datetime.now().isoformat(),
                      "authentication": "MSAL Enabled",
                      "azure_openai": "Connected",
                      "deployment": AZURE_OPENAI_DEPLOYMENT
                  }

              @app.post("/chat", response_model=ChatResponse)
              async def chat_endpoint(request: ChatRequest):
                  logger.info(f"Chat request: {request.text[:100]}... (specialist: {request.specialist})")
                  
                  try:
                      # Get AI response
                      ai_result = await insurance_agent.get_ai_response(
                          message=request.text,
                          specialist=request.specialist,
                          context=request.context
                      )
                      
                      response = ChatResponse(
                          response=ai_result["response"],
                          agent="SageInsure AI",
                          specialist=request.specialist,
                          confidence=ai_result["confidence"],
                          status=ai_result["status"],
                          conversationId=request.conversationId,
                          timestamp=datetime.now().isoformat()
                      )
                      
                      logger.info(f"Response generated successfully (status: {ai_result['status']})")
                      return response
                      
                  except Exception as e:
                      logger.error(f"Error in chat endpoint: {str(e)}")
                      return ChatResponse(
                          response="I apologize for the technical difficulty. Please try again or contact our customer service team.",
                          agent="SageInsure AI",
                          specialist=request.specialist,
                          confidence=0.3,
                          status="error",
                          conversationId=request.conversationId,
                          timestamp=datetime.now().isoformat()
                      )

              if __name__ == "__main__":
                  import uvicorn
                  uvicorn.run(app, host="0.0.0.0", port=8000)
              EOF
              python app.py
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: sageinsure-backend-service
  namespace: sageinsure
spec:
  selector:
    app: sageinsure-backend
  ports:
    - port: 8000
      targetPort: 8000
  type: LoadBalancer
