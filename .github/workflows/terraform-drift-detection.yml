name: Terraform Drift Detection

on:
  # DISABLED schedule:
  #   - cron: "0 6 * * *"
  workflow_dispatch:

env:
  TF_VERSION: "1.6.0"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  drift-detection:
    name: Detect Infrastructure Drift
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TERRAFORM_STATE_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TERRAFORM_STATE_STORAGE }}" \
            -backend-config="container_name=${{ secrets.TERRAFORM_STATE_CONTAINER }}" \
            -backend-config="key=terraform.tfstate"

      - name: Terraform Plan (Drift Check)
        id: plan
        run: |
          terraform plan -detailed-exitcode -out=drift-plan
          echo "exitcode=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check for Drift
        if: steps.plan.outputs.exitcode == 2
        run: |
          echo "🚨 Infrastructure drift detected!"
          terraform show -no-color drift-plan > drift-output.txt

      - name: Create Issue for Drift
        if: steps.plan.outputs.exitcode == 2
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const driftOutput = fs.readFileSync('terraform/drift-output.txt', 'utf8');

            const issueBody = `## 🚨 Infrastructure Drift Detected

            Terraform has detected drift in the infrastructure configuration.

            **Detection Time:** ${new Date().toISOString()}
            **Workflow:** ${context.workflow}
            **Run ID:** ${context.runId}

            ### Drift Details

            <details>
            <summary>Click to view drift details</summary>

            \`\`\`terraform
            ${driftOutput}
            \`\`\`

            </details>

            ### Recommended Actions

            1. Review the drift details above
            2. Determine if the changes are intentional
            3. If intentional, update the Terraform configuration
            4. If unintentional, investigate and remediate
            5. Run \`terraform apply\` to align infrastructure with configuration

            ### Auto-generated by Drift Detection Workflow
            `;

            // Check if there's already an open drift issue
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'infrastructure-drift'
            });

            if (existingIssues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Infrastructure Drift Detected - ${new Date().toISOString().split('T')[0]}`,
                body: issueBody,
                labels: ['infrastructure-drift', 'terraform', 'urgent']
              });
            } else {
              // Update existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssues.data[0].number,
                body: `## New Drift Detection - ${new Date().toISOString()}\n\n${issueBody}`
              });
            }

      - name: Notify Slack (if drift detected)
        if: steps.plan.outputs.exitcode == 2 && secrets.SLACK_WEBHOOK_URL
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: |
            🚨 Infrastructure drift detected in ${{ github.repository }}

            Check the GitHub issue for details and remediation steps.
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: No Drift Detected
        if: steps.plan.outputs.exitcode == 0
        run: echo "✅ No infrastructure drift detected. Configuration is in sync."
