name: Security Scanning Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "frontend/**"
      - "worker/**"
      - "Dockerfile*"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "worker/**"
      - "Dockerfile*"
  schedule:
    # Run daily security scans
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  REGISTRY: sageinsureacr.azurecr.io

jobs:
  code-security-scan:
    name: Code Security Scanning
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend, worker]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep security scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
            p/kubernetes
          generateSarif: "1"

      - name: Upload Semgrep results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

      - name: Run Bandit security scan (Python)
        if: matrix.component == 'backend'
        run: |
          pip install bandit[toml]
          bandit -r backend/ -f json -o bandit-results.json
        continue-on-error: true

      - name: Run npm audit (Node.js)
        if: matrix.component == 'frontend'
        working-directory: frontend
        run: |
          npm audit --audit-level=moderate --json > npm-audit-results.json
        continue-on-error: true

      - name: Upload security scan results
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results-${{ matrix.component }}
          path: |
            bandit-results.json
            npm-audit-results.json
          retention-days: 30
  container-security-scan:
    name: Container Security Scanning
    runs-on: ubuntu-latest
    needs: code-security-scan
    strategy:
      matrix:
        component: [backend, frontend, worker]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.${{ matrix.component }}
          tags: sageinsure-${{ matrix.component }}:scan
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sageinsure-${{ matrix.component }}:scan
          format: "sarif"
          output: "trivy-results-${{ matrix.component }}.sarif"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results-${{ matrix.component }}.sarif"

      - name: Run Grype vulnerability scanner
        uses: anchore/scan-action@v3
        with:
          image: sageinsure-${{ matrix.component }}:scan
          output-format: sarif
          output-file: grype-results-${{ matrix.component }}.sarif

      - name: Upload Grype scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "grype-results-${{ matrix.component }}.sarif"

      - name: Run Snyk container scan
        if: env.SNYK_TOKEN
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: sageinsure-${{ matrix.component }}:scan
          args: --severity-threshold=high --file=Dockerfile.${{ matrix.component }}

  kubernetes-security-scan:
    name: Kubernetes Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov Kubernetes scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: kubernetes/
          framework: kubernetes
          output_format: sarif
          output_file_path: checkov-k8s-results.sarif

      - name: Upload Checkov results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-k8s-results.sarif
