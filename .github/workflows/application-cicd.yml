name: Application CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "frontend/**"
      - "worker/**"
      - "helm-charts/**"
      - "Dockerfile*"
      - ".github/workflows/application-cicd.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "worker/**"
      - "helm-charts/**"
      - "Dockerfile*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: sageinsureacr.azurecr.io
  AKS_CLUSTER_NAME: sageinsure-aks
  AKS_RESOURCE_GROUP: sageinsure-rg

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      worker: ${{ steps.changes.outputs.worker }}
      helm: ${{ steps.changes.outputs.helm }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'Dockerfile.backend'
            frontend:
              - 'frontend/**'
              - 'Dockerfile.frontend'
            worker:
              - 'worker/**'
              - 'Dockerfile.worker'
            helm:
              - 'helm-charts/**'

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run linting
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run type checking
        run: mypy .

      - name: Run security scan
        run: |
          bandit -r . -f json -o bandit-report.json
          safety check --json --output safety-report.json
        continue-on-error: true

      - name: Upload security scan results
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-backend
          path: |
            bandit-report.json
            safety-report.json
          retention-days: 30

      - name: Run tests
        run: |
          pytest --cov=. --cov-report=xml --cov-report=html --junitxml=pytest-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-backend
          path: |
            backend/coverage.xml
            backend/htmlcov/
            backend/pytest-results.xml
          retention-days: 30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: backend/coverage.xml
          flags: backend
          name: backend-coverage

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run type-check

      - name: Run tests
        run: npm run test:ci

      - name: Run security audit
        run: |
          npm audit --audit-level=high --json > npm-audit-report.json || true
          npx audit-ci --config .audit-ci.json

      - name: Upload security audit results
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-frontend
          path: frontend/npm-audit-report.json
          retention-days: 30

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ github.ref == 'refs/heads/main' && 'https://api.sageinsure.local' || 'https://api-staging.sageinsure.local' }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next
          retention-days: 1

  build-images:
    name: Build Container Images
    runs-on: ubuntu-latest
    needs: [detect-changes, test-backend, test-frontend]
    if: always() && (needs.test-backend.result == 'success' || needs.test-backend.result == 'skipped') && (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped')
    strategy:
      matrix:
        component: [backend, frontend, worker]
        include:
          - component: backend
            condition: needs.detect-changes.outputs.backend == 'true'
          - component: frontend
            condition: needs.detect-changes.outputs.frontend == 'true'
          - component: worker
            condition: needs.detect-changes.outputs.worker == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if build needed
        id: check
        run: |
          if [[ "${{ matrix.condition }}" == "true" ]]; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
          fi

      - name: Azure Login
        if: steps.check.outputs.build == 'true'
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        if: steps.check.outputs.build == 'true'
        run: az acr login --name sageinsureacr

      - name: Set up Docker Buildx
        if: steps.check.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        if: steps.check.outputs.build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/sageinsure-${{ matrix.component }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        if: steps.check.outputs.build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.${{ matrix.component }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        if: steps.check.outputs.build == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/sageinsure-${{ matrix.component }}:${{ github.sha }}
          format: "sarif"
          output: "trivy-results-${{ matrix.component }}.sarif"

      - name: Upload Trivy scan results
        if: steps.check.outputs.build == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results-${{ matrix.component }}.sarif"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [detect-changes, build-images]
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: "latest"

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AKS_RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Create staging namespace
        run: |
          kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Backend to Staging
        if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.helm == 'true'
        run: |
          helm upgrade --install sageinsure-api-staging ./helm-charts/sageinsure-api \
            --namespace staging \
            --set image.tag=${{ github.sha }} \
            --set ingress.hosts[0].host=api-staging.sageinsure.local \
            --set ingress.tls[0].hosts[0]=api-staging.sageinsure.local \
            --wait --timeout=10m

      - name: Deploy Frontend to Staging
        if: needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.helm == 'true'
        run: |
          helm upgrade --install sageinsure-frontend-staging ./helm-charts/sageinsure-frontend \
            --namespace staging \
            --set image.tag=${{ github.sha }} \
            --set ingress.hosts[0].host=staging.sageinsure.local \
            --set ingress.tls[0].hosts[0]=staging.sageinsure.local \
            --set nextjs.buildEnv.NEXT_PUBLIC_API_URL=https://api-staging.sageinsure.local \
            --wait --timeout=10m

      - name: Deploy Worker to Staging
        if: needs.detect-changes.outputs.worker == 'true' || needs.detect-changes.outputs.helm == 'true'
        run: |
          helm upgrade --install sageinsure-worker-staging ./helm-charts/sageinsure-worker \
            --namespace staging \
            --set image.tag=${{ github.sha }} \
            --wait --timeout=10m

      - name: Run smoke tests
        run: |
          # Wait for deployments to be ready
          kubectl wait --for=condition=available --timeout=300s deployment -l app.kubernetes.io/instance=sageinsure-api-staging -n staging
          kubectl wait --for=condition=available --timeout=300s deployment -l app.kubernetes.io/instance=sageinsure-frontend-staging -n staging

          # Basic health checks
          kubectl get pods -n staging
          kubectl get ingress -n staging

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [detect-changes, build-images]
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: "latest"

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AKS_RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Deploy Backend to Production
        if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.helm == 'true'
        run: |
          helm upgrade --install sageinsure-api ./helm-charts/sageinsure-api \
            --namespace default \
            --set image.tag=${{ github.sha }} \
            --wait --timeout=15m

      - name: Deploy Frontend to Production
        if: needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.helm == 'true'
        run: |
          helm upgrade --install sageinsure-frontend ./helm-charts/sageinsure-frontend \
            --namespace default \
            --set image.tag=${{ github.sha }} \
            --wait --timeout=15m

      - name: Deploy Worker to Production
        if: needs.detect-changes.outputs.worker == 'true' || needs.detect-changes.outputs.helm == 'true'
        run: |
          helm upgrade --install sageinsure-worker ./helm-charts/sageinsure-worker \
            --namespace default \
            --set image.tag=${{ github.sha }} \
            --wait --timeout=15m

      - name: Verify Production Deployment
        run: |
          # Wait for deployments to be ready
          kubectl wait --for=condition=available --timeout=600s deployment -l app.kubernetes.io/instance=sageinsure-api -n default
          kubectl wait --for=condition=available --timeout=600s deployment -l app.kubernetes.io/instance=sageinsure-frontend -n default

          # Verify all pods are running
          kubectl get pods -n default
          kubectl get ingress -n default

          # Check service health
          kubectl run curl-test --image=curlimages/curl --rm -i --restart=Never -- \
            curl -f http://sageinsure-api.default.svc.cluster.local/health || exit 1

  notify-deployment:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()

    steps:
      - name: Notify Slack
        if: secrets.SLACK_WEBHOOK_URL
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Deployment Status: ${{ job.status }}

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            Staging: ${{ needs.deploy-staging.result }}
            Production: ${{ needs.deploy-production.result }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
