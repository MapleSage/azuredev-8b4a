name: Deployment Monitoring

on:
  # Temporarily disable scheduled runs to stop failures
  # schedule:
  #   - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to monitor"
        required: true
        type: choice
        options:
          - all
          - production
          - staging
          - development

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  AKS_CLUSTER_NAME: sageinsure-aks
  AKS_RESOURCE_GROUP: sageinsure-rg

jobs:
  health-check:
    name: Application Health Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [staging]

    steps:
      - name: Check if monitoring needed
        id: check
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "all" ]] || [[ "${{ github.event.inputs.environment }}" == "${{ matrix.environment }}" ]] || [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "monitor=true" >> $GITHUB_OUTPUT
          else
            echo "monitor=false" >> $GITHUB_OUTPUT
          fi

      - name: Azure Login
        if: steps.check.outputs.monitor == 'true'
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up kubectl
        if: steps.check.outputs.monitor == 'true'
        uses: azure/setup-kubectl@v3

      - name: Get AKS credentials
        if: steps.check.outputs.monitor == 'true'
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AKS_RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER_NAME }} \
            --overwrite-existing \
            --admin

          # Verify connection
          kubectl cluster-info
          kubectl get nodes
      - name: Check pod health
        if: steps.check.outputs.monitor == 'true'
        run: |
          namespace="${{ matrix.environment == 'production' && 'default' || matrix.environment }}"

          echo "Checking pod health in $namespace namespace..."

          # Check if namespace exists
          if ! kubectl get namespace "$namespace" &> /dev/null; then
            echo "Namespace $namespace does not exist. Creating it..."
            kubectl create namespace "$namespace"
            kubectl label namespace "$namespace" environment="${{ matrix.environment }}"
            echo "Namespace created. No pods to check yet."
            exit 0
          fi

          # Get all pods in namespace
          kubectl get pods -n "$namespace"

          # Check if there are any pods
          total_pods=$(kubectl get pods -n "$namespace" --no-headers 2>/dev/null | wc -l)
          if [ "$total_pods" -eq 0 ]; then
            echo "No pods found in $namespace namespace. This might be expected if applications haven't been deployed yet."
            exit 0
          fi

          # Check for unhealthy pods
          unhealthy_pods=$(kubectl get pods -n "$namespace" --field-selector=status.phase!=Running --no-headers | wc -l)
          if [ "$unhealthy_pods" -gt 0 ]; then
            echo "Found $unhealthy_pods unhealthy pods"
            kubectl get pods -n "$namespace" --field-selector=status.phase!=Running
            kubectl describe pods -n "$namespace" --field-selector=status.phase!=Running
            exit 1
          fi

          echo "All $total_pods pods are healthy in $namespace namespace"

      - name: Check service endpoints
        if: steps.check.outputs.monitor == 'true'
        run: |
          namespace="${{ matrix.environment == 'production' && 'default' || matrix.environment }}"

          # Check if sageinsure-api service exists
          if kubectl get service sageinsure-api -n "$namespace" &> /dev/null; then
            echo "Testing API health endpoint..."
            # Test API health endpoint
            if kubectl run health-check-${{ matrix.environment }} --image=curlimages/curl --rm -i --restart=Never -n "$namespace" -- \
              curl -f -m 30 http://sageinsure-api.$namespace.svc.cluster.local/health; then
              echo "API health check passed"
            else
              echo "API health check failed"
              exit 1
            fi
          else
            echo "sageinsure-api service not found in $namespace namespace"
            echo "Available services:"
            kubectl get services -n "$namespace" || echo "No services found"
            echo "This might be expected if applications haven't been deployed yet."
          fi

      - name: Generate health report
        if: steps.check.outputs.monitor == 'true' && failure()
        run: |
          namespace="${{ matrix.environment == 'production' && 'default' || matrix.environment }}"

          echo "# Health Check Report - ${{ matrix.environment }}" > health-report-${{ matrix.environment }}.md
          echo "**Timestamp:** $(date)" >> health-report-${{ matrix.environment }}.md
          echo "" >> health-report-${{ matrix.environment }}.md
          echo "## Pod Status" >> health-report-${{ matrix.environment }}.md
          echo '```' >> health-report-${{ matrix.environment }}.md
          kubectl get pods -n "$namespace" >> health-report-${{ matrix.environment }}.md
          echo '```' >> health-report-${{ matrix.environment }}.md

      - name: Create incident issue
        if: steps.check.outputs.monitor == 'true' && failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('health-report-${{ matrix.environment }}.md', 'utf8');

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Health Check Failed - ${{ matrix.environment }}',
              body: `Health check failed for ${{ matrix.environment }} environment.\n\n${report}`,
              labels: ['incident', 'health-check', '${{ matrix.environment }}']
            });
