name: Container Security Scanning

on:
  # DISABLED schedule:
  #   - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to scan (default: latest)"
        required: false
        default: "latest"
      component:
        description: "Component to scan"
        required: true
        type: choice
        options:
          - all
          - backend
          - frontend
          - worker

env:
  REGISTRY: sageinsureacr.azurecr.io

jobs:
  security-scan:
    name: Security Scan Container Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend, worker]

    steps:
      - name: Check if scan needed
        id: check
        run: |
          if [[ "${{ github.event.inputs.component }}" == "all" ]] || [[ "${{ github.event.inputs.component }}" == "${{ matrix.component }}" ]] || [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "scan=true" >> $GITHUB_OUTPUT
          else
            echo "scan=false" >> $GITHUB_OUTPUT
          fi

      - name: Azure Login
        if: steps.check.outputs.scan == 'true'
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        if: steps.check.outputs.scan == 'true'
        run: az acr login --name sageinsureacr

      - name: Run Trivy vulnerability scanner
        if: steps.check.outputs.scan == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/sageinsure-${{ matrix.component }}:${{ github.event.inputs.image_tag || 'latest' }}
          format: "sarif"
          output: "trivy-results-${{ matrix.component }}.sarif"

      - name: Upload Trivy scan results to GitHub Security tab
        if: steps.check.outputs.scan == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results-${{ matrix.component }}.sarif"

      - name: Run Trivy vulnerability scanner (JSON output)
        if: steps.check.outputs.scan == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/sageinsure-${{ matrix.component }}:${{ github.event.inputs.image_tag || 'latest' }}
          format: "json"
          output: "trivy-results-${{ matrix.component }}.json"

      - name: Run Grype vulnerability scanner
        if: steps.check.outputs.scan == 'true'
        uses: anchore/scan-action@v3
        with:
          image: ${{ env.REGISTRY }}/sageinsure-${{ matrix.component }}:${{ github.event.inputs.image_tag || 'latest' }}
          output-format: sarif
          output-file: grype-results-${{ matrix.component }}.sarif

      - name: Upload Grype scan results
        if: steps.check.outputs.scan == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "grype-results-${{ matrix.component }}.sarif"

      - name: Run Snyk container scan
        if: steps.check.outputs.scan == 'true' && env.SNYK_TOKEN
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ env.REGISTRY }}/sageinsure-${{ matrix.component }}:${{ github.event.inputs.image_tag || 'latest' }}
          args: --severity-threshold=high --file=Dockerfile.${{ matrix.component }}

      - name: Upload scan artifacts
        if: steps.check.outputs.scan == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results-${{ matrix.component }}
          path: |
            trivy-results-${{ matrix.component }}.json
            trivy-results-${{ matrix.component }}.sarif
            grype-results-${{ matrix.component }}.sarif
          retention-days: 90

  generate-security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: security-scan
    if: always()

    steps:
      - name: Download all scan results
        uses: actions/download-artifact@v4
        with:
          path: scan-results

      - name: Generate consolidated security report
        run: |
          echo "# Container Security Scan Report" > security-report.md
          echo "" >> security-report.md
          echo "**Scan Date:** $(date)" >> security-report.md
          echo "**Image Tag:** ${{ github.event.inputs.image_tag || 'latest' }}" >> security-report.md
          echo "" >> security-report.md

          for component in backend frontend worker; do
            echo "## $component Component" >> security-report.md
            echo "" >> security-report.md
            
            if [ -f "scan-results/security-scan-results-$component/trivy-results-$component.json" ]; then
              # Parse Trivy results for summary
              vulnerabilities=$(jq '.Results[0].Vulnerabilities | length' "scan-results/security-scan-results-$component/trivy-results-$component.json" 2>/dev/null || echo "0")
              echo "- **Vulnerabilities Found:** $vulnerabilities" >> security-report.md
              
              # Count by severity
              critical=$(jq '.Results[0].Vulnerabilities | map(select(.Severity == "CRITICAL")) | length' "scan-results/security-scan-results-$component/trivy-results-$component.json" 2>/dev/null || echo "0")
              high=$(jq '.Results[0].Vulnerabilities | map(select(.Severity == "HIGH")) | length' "scan-results/security-scan-results-$component/trivy-results-$component.json" 2>/dev/null || echo "0")
              medium=$(jq '.Results[0].Vulnerabilities | map(select(.Severity == "MEDIUM")) | length' "scan-results/security-scan-results-$component/trivy-results-$component.json" 2>/dev/null || echo "0")
              
              echo "- **Critical:** $critical" >> security-report.md
              echo "- **High:** $high" >> security-report.md
              echo "- **Medium:** $medium" >> security-report.md
            else
              echo "- **Status:** Scan failed or no results" >> security-report.md
            fi
            echo "" >> security-report.md
          done

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: consolidated-security-report
          path: security-report.md
          retention-days: 90

      - name: Create GitHub Issue for Critical Vulnerabilities
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // Check for critical vulnerabilities
            let hasCritical = false;
            const components = ['backend', 'frontend', 'worker'];

            for (const component of components) {
              try {
                const trivyResults = JSON.parse(fs.readFileSync(`scan-results/security-scan-results-${component}/trivy-results-${component}.json`, 'utf8'));
                const critical = trivyResults.Results?.[0]?.Vulnerabilities?.filter(v => v.Severity === 'CRITICAL') || [];
                if (critical.length > 0) {
                  hasCritical = true;
                  break;
                }
              } catch (error) {
                console.log(`Could not parse results for ${component}: ${error.message}`);
              }
            }

            if (hasCritical) {
              const report = fs.readFileSync('security-report.md', 'utf8');
              
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 Critical Security Vulnerabilities Found - ${new Date().toISOString().split('T')[0]}`,
                body: `Critical security vulnerabilities have been detected in container images.\n\n${report}`,
                labels: ['security', 'critical', 'vulnerability']
              });
            }
