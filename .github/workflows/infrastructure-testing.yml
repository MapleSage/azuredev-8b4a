name: Infrastructure Testing

on:
  # TEMPORARILY DISABLED ALL TRIGGERS
  # push:
  #   branches: [main, develop]
  #   paths:
  #     - "terraform/**"
  #     - "tests/**"
  #     - ".github/workflows/infrastructure-testing.yml"
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - "terraform/**"
  #     - "tests/**"
  # schedule:
  #   - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      test_type:
        description: "Type of tests to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - terratest
          - e2e
          - load
      load_test_users:
        description: "Number of load test users"
        required: false
        default: "10"
        type: string
      load_test_duration:
        description: "Load test duration"
        required: false
        default: "5m"
        type: string

env:
  GO_VERSION: "1.21"
  TERRAFORM_VERSION: "1.6.0"
  K6_VERSION: "v0.47.0"

jobs:
  terratest:
    name: Terratest Infrastructure Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'terratest' || github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('tests/terratest/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Initialize Go modules
        run: |
          cd tests/terratest
          go mod tidy

      - name: Run Terratest - Network Tests
        run: |
          cd tests/terratest
          go test -v -timeout 30m ./network_test.go
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Run Terratest - Identity Tests
        run: |
          cd tests/terratest
          go test -v -timeout 20m ./identity_test.go
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Run Terratest - AKS Tests (Long Running)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          cd tests/terratest
          go test -v -timeout 60m ./aks_cluster_test.go
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Upload Terratest Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: terratest-results
          path: tests/terratest/*.log
          retention-days: 30

  e2e-tests:
    name: End-to-End Connectivity Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'e2e' || github.event_name != 'workflow_dispatch'
    needs: [terratest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group sageinsure-rg \
            --name sageinsure-aks \
            --overwrite-existing

      - name: Verify cluster connectivity
        run: |
          kubectl cluster-info
          kubectl get nodes
          kubectl get pods --all-namespaces

      - name: Initialize Go modules for E2E tests
        run: |
          cd tests/e2e
          go mod init sageinsure-e2e-tests || true
          go mod tidy

      - name: Run E2E connectivity tests
        run: |
          cd tests/e2e
          go test -v -timeout 20m ./connectivity_test.go
        env:
          KUBECONFIG: ~/.kube/config
          TEST_NAMESPACE: default
          BASE_URL: https://sageinsure.local
          API_URL: https://api.sageinsure.local

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: tests/e2e/*.log
          retention-days: 30

  load-tests:
    name: Load Testing
    runs-on: ubuntu-latest
    if: github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'load' || (github.event_name == 'schedule')
    needs: [e2e-tests]

    strategy:
      matrix:
        load_tool: [k6, locust]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python (for Locust)
        if: matrix.load_tool == 'locust'
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Locust
        if: matrix.load_tool == 'locust'
        run: |
          pip install locust

      - name: Install K6
        if: matrix.load_tool == 'k6'
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run K6 Load Tests
        if: matrix.load_tool == 'k6'
        run: |
          cd tests/load
          k6 run --vus ${{ github.event.inputs.load_test_users || '10' }} \
                 --duration ${{ github.event.inputs.load_test_duration || '5m' }} \
                 --out json=k6-results.json \
                 k6-load-test.js
        env:
          BASE_URL: https://sageinsure.local
          API_URL: https://api.sageinsure.local

      - name: Run Locust Load Tests
        if: matrix.load_tool == 'locust'
        run: |
          cd tests/load
          locust -f locust-load-test.py \
                 --host=https://api.sageinsure.local \
                 --headless \
                 -u ${{ github.event.inputs.load_test_users || '10' }} \
                 -r 2 \
                 -t ${{ github.event.inputs.load_test_duration || '5m' }} \
                 --html=locust-report.html \
                 --csv=locust-results

      - name: Upload K6 results
        if: matrix.load_tool == 'k6'
        uses: actions/upload-artifact@v4
        with:
          name: k6-load-test-results
          path: tests/load/k6-results.json
          retention-days: 30

      - name: Upload Locust results
        if: matrix.load_tool == 'locust'
        uses: actions/upload-artifact@v4
        with:
          name: locust-load-test-results
          path: |
            tests/load/locust-report.html
            tests/load/locust-results*.csv
          retention-days: 30

  security-tests:
    name: Security Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Terraform security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "terraform"
          format: "sarif"
          output: "trivy-terraform-results.sarif"

      - name: Upload Terraform security scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-terraform-results.sarif"

      - name: Run test code security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "tests"
          format: "sarif"
          output: "trivy-tests-results.sarif"

      - name: Upload test security scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-tests-results.sarif"

  generate-report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    needs: [terratest, e2e-tests, load-tests, security-tests]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: test-results

      - name: Generate comprehensive test report
        run: |
          echo "# Infrastructure Test Report" > test-report.md
          echo "" >> test-report.md
          echo "**Date:** $(date)" >> test-report.md
          echo "**Commit:** ${{ github.sha }}" >> test-report.md
          echo "**Branch:** ${{ github.ref_name }}" >> test-report.md
          echo "**Trigger:** ${{ github.event_name }}" >> test-report.md
          echo "" >> test-report.md

          echo "## Test Results Summary" >> test-report.md
          echo "" >> test-report.md

          # Terratest results
          if [ "${{ needs.terratest.result }}" = "success" ]; then
            echo "✅ **Terratest Infrastructure Tests:** PASSED" >> test-report.md
          else
            echo "❌ **Terratest Infrastructure Tests:** FAILED" >> test-report.md
          fi

          # E2E results
          if [ "${{ needs.e2e-tests.result }}" = "success" ]; then
            echo "✅ **End-to-End Tests:** PASSED" >> test-report.md
          else
            echo "❌ **End-to-End Tests:** FAILED" >> test-report.md
          fi

          # Load test results
          if [ "${{ needs.load-tests.result }}" = "success" ]; then
            echo "✅ **Load Tests:** COMPLETED" >> test-report.md
          else
            echo "❌ **Load Tests:** FAILED" >> test-report.md
          fi

          # Security test results
          if [ "${{ needs.security-tests.result }}" = "success" ]; then
            echo "✅ **Security Tests:** PASSED" >> test-report.md
          else
            echo "❌ **Security Tests:** FAILED" >> test-report.md
          fi

          echo "" >> test-report.md
          echo "## Detailed Results" >> test-report.md
          echo "" >> test-report.md

          # Add artifact information
          if [ -d "test-results" ]; then
            echo "### Available Test Artifacts" >> test-report.md
            find test-results -type f -name "*.json" -o -name "*.html" -o -name "*.csv" | while read file; do
              echo "- $(basename "$file")" >> test-report.md
            done
          fi

          echo "" >> test-report.md
          echo "---" >> test-report.md
          echo "Generated by SageInsure Infrastructure Testing Pipeline" >> test-report.md

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: comprehensive-test-report
          path: test-report.md
          retention-days: 90

      - name: Comment PR with test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('test-report.md', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🧪 Infrastructure Test Results\n\n${report}`
            });

      - name: Create issue on test failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('test-report.md', 'utf8');

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Scheduled Infrastructure Tests Failed - ${new Date().toISOString().split('T')[0]}`,
              body: `Scheduled infrastructure tests have failed.\n\n${report}`,
              labels: ['testing', 'infrastructure', 'failure']
            });
