apiVersion: v1
kind: Namespace
metadata:
  name: sageinsure
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: underwriting-workbench
  namespace: sageinsure
  labels:
    app: underwriting-workbench
spec:
  replicas: 2
  selector:
    matchLabels:
      app: underwriting-workbench
  template:
    metadata:
      labels:
        app: underwriting-workbench
    spec:
      containers:
      - name: workbench
        image: sageinsureacr.azurecr.io/underwriting-workbench:latest
        ports:
        - containerPort: 8501
        env:
        - name: AZURE_OPENAI_ENDPOINT
          value: "https://sageinsure-openai.openai.azure.com/"
        - name: AZURE_SEARCH_ENDPOINT
          value: "https://sageinsure-search.search.windows.net/"
        - name: AZURE_STORAGE_ACCOUNT
          value: "policydocseedfa81f"
        - name: AZURE_OPENAI_KEY
          valueFrom:
            secretKeyRef:
              name: azure-secrets
              key: openai-key
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: underwriting-workbench-service
  namespace: sageinsure
spec:
  selector:
    app: underwriting-workbench
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8501
  type: LoadBalancer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: underwriting-workbench-ingress
  namespace: sageinsure
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - underwriting.sageinsure.com
    secretName: sageinsure-tls
  rules:
  - host: underwriting.sageinsure.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: underwriting-workbench-service
            port:
              number: 80