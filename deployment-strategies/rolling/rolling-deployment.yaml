# Rolling Deployment Strategy for SageInsure
# This strategy gradually replaces instances of the old version with the new version
# ensuring zero downtime with configurable rollout speed and rollback capabilities

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sageinsure-api-rolling
  namespace: default
  labels:
    app.kubernetes.io/name: sageinsure-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: sageinsure
    deployment.strategy: rolling
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Maximum number of pods that can be unavailable during the update
      maxUnavailable: 1
      # Maximum number of pods that can be created above the desired replica count
      maxSurge: 2
  # Minimum number of seconds for which a newly created pod should be ready
  minReadySeconds: 30
  # Number of old ReplicaSets to retain for rollback
  revisionHistoryLimit: 10
  # Maximum time in seconds for a deployment to make progress
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app.kubernetes.io/name: sageinsure-api
      deployment.strategy: rolling
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sageinsure-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: sageinsure
        deployment.strategy: rolling
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: sageinsure-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      # Graceful shutdown configuration
      terminationGracePeriodSeconds: 60
      containers:
        - name: api
          image: sageinsureacr.azurecr.io/sageinsure-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
            - containerPort: 9090
              name: metrics
              protocol: TCP
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: LOG_LEVEL
              value: "info"
            - name: PORT
              value: "8080"
            - name: METRICS_PORT
              value: "9090"
            - name: DEPLOYMENT_TYPE
              value: "rolling"
            - name: GRACEFUL_SHUTDOWN_TIMEOUT
              value: "50s"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-secret
                  key: connection-string
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: azure-secrets
                  key: openai-api-key
            - name: SEARCH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: azure-secrets
                  key: search-api-key
          # Startup probe for slow-starting containers
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12 # Allow up to 60 seconds for startup
          # Liveness probe to restart unhealthy containers
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # Readiness probe to control traffic routing
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          # Resource management
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          # Volume mounts for writable directories
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/cache
          # Graceful shutdown hook
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    echo "Received SIGTERM, starting graceful shutdown..."
                    # Stop accepting new requests
                    curl -X POST http://localhost:8080/shutdown/prepare || true
                    # Wait for existing requests to complete
                    sleep 10
                    echo "Graceful shutdown preparation complete"
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
      imagePullSecrets:
        - name: acr-secret

---
# Service for Rolling Deployment
apiVersion: v1
kind: Service
metadata:
  name: sageinsure-api-rolling
  namespace: default
  labels:
    app.kubernetes.io/name: sageinsure-api
    app.kubernetes.io/component: api
    service.type: rolling
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
    - port: 9090
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app.kubernetes.io/name: sageinsure-api
    deployment.strategy: rolling

---
# HorizontalPodAutoscaler for Rolling Deployment
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sageinsure-api-rolling-hpa
  namespace: default
  labels:
    app.kubernetes.io/name: sageinsure-api
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sageinsure-api-rolling
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    # Custom metrics for business-aware scaling
    - type: Pods
      pods:
        metric:
          name: http_requests_per_second
        target:
          type: AverageValue
          averageValue: "100"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 3
          periodSeconds: 60
      selectPolicy: Max

---
# PodDisruptionBudget for Rolling Deployment
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sageinsure-api-rolling-pdb
  namespace: default
  labels:
    app.kubernetes.io/name: sageinsure-api
    app.kubernetes.io/component: api
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sageinsure-api
      deployment.strategy: rolling
