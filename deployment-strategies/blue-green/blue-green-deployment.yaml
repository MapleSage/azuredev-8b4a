# Blue-Green Deployment Strategy for SageInsure
# This strategy maintains two identical production environments (blue and green)
# and switches traffic between them for zero-downtime deployments

apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: sageinsure-api-blue-green
  namespace: default
  labels:
    app.kubernetes.io/name: sageinsure-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: sageinsure
    deployment.strategy: blue-green
spec:
  replicas: 3
  strategy:
    blueGreen:
      # Service that the rollout modifies as the active service
      activeService: sageinsure-api-active
      # Service that the rollout modifies as the preview service
      previewService: sageinsure-api-preview
      # Auto-promotion after successful analysis
      autoPromotionEnabled: false
      # Promotion after manual approval
      scaleDownDelaySeconds: 30
      prePromotionAnalysis:
        templates:
        - templateName: success-rate
        args:
        - name: service-name
          value: sageinsure-api-preview
      postPromotionAnalysis:
        templates:
        - templateName: success-rate
        args:
        - name: service-name
          value: sageinsure-api-active
      # Keep old version for quick rollback
      scaleDownDelaySeconds: 300
  selector:
    matchLabels:
      app.kubernetes.io/name: sageinsure-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sageinsure-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: sageinsure
    spec:
      serviceAccountName: sageinsure-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: api
        image: sageinsureacr.azurecr.io/sageinsure-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 9090
          name: metrics
          protocol: TCP
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "info"
        - name: PORT
          value: "8080"
        - name: METRICS_PORT
          value: "9090"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: connection-string
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: azure-secrets
              key: openai-api-key
        - name: SEARCH_API_KEY
          valueFrom:
            secretKeyRef:
              name: azure-secrets
              key: search-api-key
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/cache
      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
      imagePullSecrets:
      - name: acr-secret

---
# Active Service (receives production traffic)
apiVersion: v1
kind: Service
metadata:
  name: sageinsure-api-active
  namespace: default
  labels:
    app.kubernetes.io/name: sageinsure-api
    app.kubernetes.io/component: api
    service.type: active
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  - port: 9090
    targetPort: metrics
    protocol: TCP
    name: metrics
  selector:
    app.kubernetes.io/name: sageinsure-api

---
# Preview Service (receives test traffic during deployment)
apiVersion: v1
kind: Service
metadata:
  name: sageinsure-api-preview
  namespace: default
  labels:
    app.kubernetes.io/name: sageinsure-api
    app.kubernetes.io/component: api
    service.type: preview
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  - port: 9090
    targetPort: metrics
    protocol: TCP
    name: metrics
  selector:
    app.kubernetes.io/name: sageinsure-api

---
# Analysis Template for Success Rate
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
  namespace: default
spec:
  args:
  - name: service-name
  metrics:
  - name: success-rate
    interval: 60s
    count: 5
    successCondition: result[0] >= 0.95
    failureLimit: 3
    provider:
      prometheus:
        address: http://prometheus-server.monitoring.svc.cluster.local:80
        query: |
          sum(rate(http_requests_total{service="{{args.service-name}}",status!~"5.."}[2m])) /
          sum(rate(http_requests_total{service="{{args.service-name}}"}[2m]))
  - name: avg-response-time
    interval: 60s
    count: 5
    successCondition: result[0] <= 2000
    failureLimit: 3
    provider:
      prometheus:
        address: http://prometheus-server.monitoring.svc.cluster.local:80
        query: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{service="{{args.service-name}}"}[2m])) by (le)
          ) * 1000