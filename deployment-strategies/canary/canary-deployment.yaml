# Canary Deployment Strategy for SageInsure
# This strategy gradually shifts traffic from the stable version to the new version
# allowing for safe rollouts with automatic rollback on failure

apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: sageinsure-api-canary
  namespace: default
  labels:
    app.kubernetes.io/name: sageinsure-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: sageinsure
    deployment.strategy: canary
spec:
  replicas: 5
  strategy:
    canary:
      # Canary service for new version
      canaryService: sageinsure-api-canary
      # Stable service for current version
      stableService: sageinsure-api-stable
      # Traffic routing configuration
      trafficRouting:
        nginx:
          stableIngress: sageinsure-api-stable
          additionalIngressAnnotations:
            canary-by-header: X-Canary
            canary-by-header-value: "true"
      # Canary deployment steps
      steps:
        # Step 1: Deploy canary with 0% traffic for smoke tests
        - setWeight: 0
        - pause:
            duration: 60s
        # Step 2: Route 10% of traffic to canary
        - setWeight: 10
        - pause:
            duration: 300s
        # Step 3: Run analysis on 10% traffic
        - analysis:
            templates:
              - templateName: canary-success-rate
            args:
              - name: canary-service
                value: sageinsure-api-canary
              - name: stable-service
                value: sageinsure-api-stable
        # Step 4: Increase to 25% traffic
        - setWeight: 25
        - pause:
            duration: 300s
        # Step 5: Run extended analysis
        - analysis:
            templates:
              - templateName: canary-success-rate
              - templateName: canary-latency
            args:
              - name: canary-service
                value: sageinsure-api-canary
              - name: stable-service
                value: sageinsure-api-stable
        # Step 6: Increase to 50% traffic
        - setWeight: 50
        - pause:
            duration: 600s
        # Step 7: Final analysis before full promotion
        - analysis:
            templates:
              - templateName: canary-success-rate
              - templateName: canary-latency
              - templateName: canary-error-rate
            args:
              - name: canary-service
                value: sageinsure-api-canary
              - name: stable-service
                value: sageinsure-api-stable
        # Step 8: Route 75% traffic to canary
        - setWeight: 75
        - pause:
            duration: 300s
        # Step 9: Full promotion (100% traffic)
        - setWeight: 100
      # Automatic rollback configuration
      abortScaleDownDelaySeconds: 30
      scaleDownDelaySeconds: 30
  selector:
    matchLabels:
      app.kubernetes.io/name: sageinsure-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sageinsure-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: sageinsure
    spec:
      serviceAccountName: sageinsure-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: sageinsureacr.azurecr.io/sageinsure-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
            - containerPort: 9090
              name: metrics
              protocol: TCP
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: LOG_LEVEL
              value: "info"
            - name: PORT
              value: "8080"
            - name: METRICS_PORT
              value: "9090"
            - name: DEPLOYMENT_TYPE
              value: "canary"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-secret
                  key: connection-string
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: azure-secrets
                  key: openai-api-key
            - name: SEARCH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: azure-secrets
                  key: search-api-key
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
      imagePullSecrets:
        - name: acr-secret

---
# Stable Service (current production version)
apiVersion: v1
kind: Service
metadata:
  name: sageinsure-api-stable
  namespace: default
  labels:
    app.kubernetes.io/name: sageinsure-api
    app.kubernetes.io/component: api
    service.type: stable
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
    - port: 9090
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app.kubernetes.io/name: sageinsure-api

---
# Canary Service (new version being tested)
apiVersion: v1
kind: Service
metadata:
  name: sageinsure-api-canary
  namespace: default
  labels:
    app.kubernetes.io/name: sageinsure-api
    app.kubernetes.io/component: api
    service.type: canary
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
    - port: 9090
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app.kubernetes.io/name: sageinsure-api

---
# Analysis Template for Canary Success Rate
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: canary-success-rate
  namespace: default
spec:
  args:
    - name: canary-service
    - name: stable-service
  metrics:
    - name: canary-success-rate
      interval: 60s
      count: 5
      successCondition: result[0] >= 0.95
      failureLimit: 2
      provider:
        prometheus:
          address: http://prometheus-server.monitoring.svc.cluster.local:80
          query: |
            sum(rate(http_requests_total{service="{{args.canary-service}}",status!~"5.."}[2m])) /
            sum(rate(http_requests_total{service="{{args.canary-service}}"}[2m]))
    - name: stable-success-rate
      interval: 60s
      count: 5
      successCondition: result[0] >= 0.95
      failureLimit: 2
      provider:
        prometheus:
          address: http://prometheus-server.monitoring.svc.cluster.local:80
          query: |
            sum(rate(http_requests_total{service="{{args.stable-service}}",status!~"5.."}[2m])) /
            sum(rate(http_requests_total{service="{{args.stable-service}}"}[2m]))

---
# Analysis Template for Canary Latency
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: canary-latency
  namespace: default
spec:
  args:
    - name: canary-service
    - name: stable-service
  metrics:
    - name: canary-p95-latency
      interval: 60s
      count: 5
      successCondition: result[0] <= 2000
      failureLimit: 2
      provider:
        prometheus:
          address: http://prometheus-server.monitoring.svc.cluster.local:80
          query: |
            histogram_quantile(0.95,
              sum(rate(http_request_duration_seconds_bucket{service="{{args.canary-service}}"}[2m])) by (le)
            ) * 1000
    - name: stable-p95-latency
      interval: 60s
      count: 5
      successCondition: result[0] <= 2000
      failureLimit: 2
      provider:
        prometheus:
          address: http://prometheus-server.monitoring.svc.cluster.local:80
          query: |
            histogram_quantile(0.95,
              sum(rate(http_request_duration_seconds_bucket{service="{{args.stable-service}}"}[2m])) by (le)
            ) * 1000
    - name: latency-comparison
      interval: 60s
      count: 5
      # Canary latency should not be more than 20% higher than stable
      successCondition: |
        (result[0] / result[1]) <= 1.2
      failureLimit: 2
      provider:
        prometheus:
          address: http://prometheus-server.monitoring.svc.cluster.local:80
          query: |
            (
              histogram_quantile(0.95,
                sum(rate(http_request_duration_seconds_bucket{service="{{args.canary-service}}"}[2m])) by (le)
              ),
              histogram_quantile(0.95,
                sum(rate(http_request_duration_seconds_bucket{service="{{args.stable-service}}"}[2m])) by (le)
              )
            )

---
# Analysis Template for Error Rate Comparison
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: canary-error-rate
  namespace: default
spec:
  args:
    - name: canary-service
    - name: stable-service
  metrics:
    - name: canary-error-rate
      interval: 60s
      count: 5
      successCondition: result[0] <= 0.05
      failureLimit: 2
      provider:
        prometheus:
          address: http://prometheus-server.monitoring.svc.cluster.local:80
          query: |
            sum(rate(http_requests_total{service="{{args.canary-service}}",status=~"5.."}[2m])) /
            sum(rate(http_requests_total{service="{{args.canary-service}}"}[2m]))
    - name: error-rate-comparison
      interval: 60s
      count: 5
      # Canary error rate should not be significantly higher than stable
      successCondition: |
        (result[0] - result[1]) <= 0.02
      failureLimit: 2
      provider:
        prometheus:
          address: http://prometheus-server.monitoring.svc.cluster.local:80
          query: |
            (
              sum(rate(http_requests_total{service="{{args.canary-service}}",status=~"5.."}[2m])) /
              sum(rate(http_requests_total{service="{{args.canary-service}}"}[2m])),
              sum(rate(http_requests_total{service="{{args.stable-service}}",status=~"5.."}[2m])) /
              sum(rate(http_requests_total{service="{{args.stable-service}}"}[2m]))
            )
