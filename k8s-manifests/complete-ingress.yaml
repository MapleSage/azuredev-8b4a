apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sageinsure-complete-ingress
  namespace: sageinsure-agents
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: agents.maplesage.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: sageinsure-backend-service
            port:
              number: 80
      - path: /chat
        pathType: Prefix
        backend:
          service:
            name: sageinsure-backend-service
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sageinsure-frontend-service
            port:
              number: 80