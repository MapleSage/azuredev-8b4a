apiVersion: v1
kind: ConfigMap
metadata:
  name: health-backend-config
  namespace: ingress-nginx
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        
        location / {
            return 200 'healthy\n';
            add_header Content-Type text/plain;
        }
        
        location /healthz {
            return 200 'healthy\n';
            add_header Content-Type text/plain;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-backend
  namespace: ingress-nginx
  labels:
    app: health-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: health-backend
  template:
    metadata:
      labels:
        app: health-backend
    spec:
      containers:
        - name: health-backend
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: 10m
              memory: 20Mi
            requests:
              cpu: 10m
              memory: 20Mi
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: nginx-config
          configMap:
            name: health-backend-config
---
apiVersion: v1
kind: Service
metadata:
  name: health-backend
  namespace: ingress-nginx
  labels:
    app: health-backend
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: health-backend
