# MCP Server Deployments
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-arxiv
  namespace: sageinsure-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-arxiv
  template:
    metadata:
      labels:
        app: mcp-arxiv
    spec:
      containers:
      - name: mcp-arxiv
        image: sageinsureacr.azurecr.io/mcp-arxiv:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-arxiv
  namespace: sageinsure-agents
spec:
  selector:
    app: mcp-arxiv
  ports:
  - port: 8080
    targetPort: 8080
---
