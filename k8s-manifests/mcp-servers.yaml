apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-memory
  namespace: sageinsure-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-memory
  template:
    metadata:
      labels:
        app: mcp-memory
    spec:
      containers:
      - name: mcp-memory
        image: sageinsureacr.azurecr.io/mcp-memory:latest
        ports:
        - containerPort: 8080
        env:
        - name: COSMOS_ENDPOINT
          value: "https://sageagentcore-cosmos.documents.azure.com"
        - name: COSMOS_KEY
          valueFrom:
            secretKeyRef:
              name: cosmos-secret
              key: key
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-memory
  namespace: sageinsure-agents
spec:
  selector:
    app: mcp-memory
  ports:
  - port: 8080
    targetPort: 8080
---
