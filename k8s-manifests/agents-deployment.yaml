apiVersion: v1
kind: Namespace
metadata:
  name: sageinsure-agents
---
# Claims Manager Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claims-manager
  namespace: sageinsure-agents
spec:
  replicas: 2
  selector:
    matchLabels:
      app: claims-manager
  template:
    metadata:
      labels:
        app: claims-manager
    spec:
      containers:
      - name: claims-manager
        image: sageins# Claims Manager Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claims-manager
  namespace: sageinsure-agents
spec:
  replicas: 2
  selector:
    matchLabels:
      app: claims-manager
  template:
    metadata:
      labels:
        app: claims-manager
    spec:
      containers:
      - name: claims-manager
        image: sageins# Claims Manager Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claims-manager
  namespace: sageinsure-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claims-manager
  template:
    metadata:
      labels:
        app: claims-manager
    spec:
      containers:
      - name: claims-manager
        image: sageinsureacr1758906383.azurecr.io/claims-manager:latest
        ports:
        - containerPort: 8080
        env:
        - name: AZURE_OPENAI_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: azure-openai-secret
              key: endpoint
        - name: AZURE_OPENAI_KEY
          valueFrom:
            secretKeyRef:
              name: azure-openai-secret
              key: key
        - name: AZURE_SEARCH_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: azure-search-secret
              key: endpoint
        - name: AZURE_SEARCH_KEY
          valueFrom:
            secretKeyRef:
              name: azure-search-secret
              key: key
        - name: MCP_CONFIG
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: models.json
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: claims-manager-service
  namespace: sageinsure-agents
spec:
  selector:
    app: claims-manager
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP
