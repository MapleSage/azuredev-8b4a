  namespace: sageinsure-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: research-assistant
  template:
    metadata:
      labels:
        app: research-assistant
    spec:
      containers:
      - name: research-assistant
        image: sageinsureacr1758906383.azurecr.io/research-assistant:latest
        ports:
        - containerPort: 8080
        env:
        - name: AZURE_OPENAI_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: azure-openai-secret
              key: endpoint
        - name: AZURE_OPENAI_KEY
          valueFrom:
            secretKeyRef:
              name: azure-openai-secret
              key: key
        - name: MCP_SERVERS
          value: "arxiv,pubmed,clinicaltrial,chembl,tavily"
        - name: MCP_CONFIG
          valueFrom:
            configMapKeyRef:
              name: agent-config
              key: models.json
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
---
