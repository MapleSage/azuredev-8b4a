<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SageInsure - Azure AgentCore Integration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { background: #0078d4; color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .status { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #107c10; }
        .chat-container { background: white; border-radius: 8px; height: 600px; display: flex; flex-direction: column; }
        .chat-header { background: #0078d4; color: white; padding: 15px; border-radius: 8px 8px 0 0; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 15px; max-width: 80%; }
        .message.user { margin-left: auto; background: #0078d4; color: white; padding: 10px 15px; border-radius: 15px; }
        .message.assistant { background: #f3f2f1; padding: 10px 15px; border-radius: 15px; }
        .message.loading { background: #e1f5fe; padding: 10px 15px; border-radius: 15px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .chat-input { padding: 20px; border-top: 1px solid #e0e0e0; display: flex; gap: 10px; }
        .chat-input input { flex: 1; padding: 10px; border: 1px solid #d1d1d1; border-radius: 4px; }
        .chat-input button { background: #0078d4; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        .chat-input button:hover { background: #106ebe; }
        .chat-input button:disabled { background: #d1d1d1; cursor: not-allowed; }
        .agent-info { font-size: 12px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ SageInsure - Azure AgentCore</h1>
            <p>Multi-Agent RAG System with MCP Protocol</p>
        </div>

        <div class="status">
            <strong>✅ System Status:</strong> 
            <span id="status">Connecting to Azure AgentCore...</span>
        </div>

        <div class="chat-container">
            <div class="chat-header">
                <h3>Insurance Policy Assistant</h3>
                <div>Session: <span id="session-id">Loading...</span></div>
            </div>
            <div class="chat-messages" id="messages"></div>
            <div class="chat-input">
                <input type="text" id="message-input" placeholder="Ask about insurance policies..." />
                <button onclick="sendMessage()" id="send-btn">Send</button>
            </div>
        </div>
    </div>

    <script>
        const AGENTCORE_ENDPOINT = "https://sageinsure-agent.greenforest-00f97c58.eastus.azurecontainerapps.io";
        let sessionId = `session-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
        let isLoading = false;

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('session-id').textContent = sessionId.slice(-12);
            
            // Test connection
            try {
                const response = await fetch(`${AGENTCORE_ENDPOINT}/`);
                const data = await response.json();
                document.getElementById('status').innerHTML = `<span style="color: #107c10;">Connected to Azure AgentCore v${data.version || '1.0'}</span>`;
                
                // Add welcome message
                addMessage('assistant', 'Hello! I\'m your SageInsure AI assistant powered by Azure AgentCore. I can help you with insurance policy questions using multi-agent RAG technology.');
            } catch (error) {
                document.getElementById('status').innerHTML = `<span style="color: #d13438;">Connection failed: ${error.message}</span>`;
            }
        });

        // Add message to chat
        function addMessage(role, content, agentInfo = null) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `
                <div>${content}</div>
                ${agentInfo ? `<div class="agent-info">${agentInfo}</div>` : ''}
            `;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Send message
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const sendBtn = document.getElementById('send-btn');
            const message = input.value.trim();
            
            if (!message || isLoading) return;

            // Add user message
            addMessage('user', message);
            input.value = '';
            
            // Show loading
            isLoading = true;
            sendBtn.disabled = true;
            sendBtn.textContent = 'Processing...';
            addMessage('loading', 'Azure AgentCore is processing your request...');

            try {
                const response = await fetch(`${AGENTCORE_ENDPOINT}/invocations`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        prompt: message,
                        session_id: sessionId
                    })
                });

                // Remove loading message
                const messages = document.getElementById('messages');
                messages.removeChild(messages.lastChild);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                addMessage('assistant', data.result, 'Processed by Azure AgentCore multi-agent system');

            } catch (error) {
                // Remove loading message
                const messages = document.getElementById('messages');
                messages.removeChild(messages.lastChild);
                
                addMessage('assistant', `I'm experiencing technical difficulties. Please try again. (Error: ${error.message})`, 'Error handler');
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send';
                input.focus();
            }
        }

        // Enter key support
        document.getElementById('message-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
