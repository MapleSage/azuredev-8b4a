version: "3.8"

services:
  azure-fastapi:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: sageinsure-azure-api
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - WORKERS=1
      - RELOAD=false
      - LOG_LEVEL=INFO
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - sageinsure-network

  # Optional: Redis for caching (if needed in future)
  redis:
    image: redis:7-alpine
    container_name: sageinsure-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - sageinsure-network
    profiles:
      - cache

  # Optional: Nginx reverse proxy (for production)
  nginx:
    image: nginx:alpine
    container_name: sageinsure-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - azure-fastapi
    restart: unless-stopped
    networks:
      - sageinsure-network
    profiles:
      - proxy

volumes:
  redis_data:

networks:
  sageinsure-network:
    driver: bridge
