apiVersion: apps/v1
kind: Deployment
metadata:
  name: sageinsure-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sageinsure-api
  template:
    metadata:
      labels:
        app: sageinsure-api
    spec:
      containers:
      - name: api
        image: ${ACR_NAME}.azurecr.io/sageinsure-api:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: sageinsure-api-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: sageinsure-api