{{- if .Values.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "sageinsure-api.fullname" . }}
  labels:
    {{- include "sageinsure-api.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "sageinsure-api.selectorLabels" . | nindent 6 }}
  endpoints:
  - port: metrics
    path: {{ .Values.monitoring.path }}
    interval: 30s
    scrapeTimeout: 10s
{{- end }}