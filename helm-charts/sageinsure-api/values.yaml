# Default values for sageinsure-api
replicaCount: 2

image:
  repository: sageinsureacr.azurecr.io/sageinsure-api
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations:
    azure.workload.identity/client-id: "" # Will be set by Terraform
  # The name of the service account to use.
  name: "sageinsure-api"

podAnnotations:
  azure.workload.identity/use: "true"

podSecurityContext:
  fsGroup: 2000
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 80
  targetPort: 8000
  name: http

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: api.sageinsure.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: sageinsure-api-tls
      hosts:
        - api.sageinsure.local

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - sageinsure-api
          topologyKey: kubernetes.io/hostname

# Application configuration
app:
  port: 8000
  environment: production
  logLevel: INFO

# Health check configuration
healthCheck:
  enabled: true
  path: /health/live
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  enabled: true
  path: /health/ready
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1

startupProbe:
  enabled: true
  path: /health/startup
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30
  successThreshold: 1

# Azure Key Vault integration
keyVault:
  enabled: true
  name: "kv-eedfa81f"
  secrets:
    - name: openai-api-key
      key: OPENAI-API-KEY
      envVar: OPENAI_API_KEY
    - name: search-api-key
      key: SEARCH-API-KEY
      envVar: AZURE_SEARCH_API_KEY

# Environment variables
env:
  - name: AZURE_SEARCH_ENDPOINT
    value: "https://sageinsure-search.search.windows.net"
  - name: AZURE_OPENAI_ENDPOINT
    value: "https://sageinsure-openai.openai.azure.com"
  - name: AZURE_STORAGE_ACCOUNT_NAME
    value: "policydocseedfa81f"

# Monitoring configuration
monitoring:
  enabled: true
  port: 9090
  path: /metrics

# Service mesh configuration (if using Istio)
serviceMesh:
  enabled: false
