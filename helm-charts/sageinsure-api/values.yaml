# Default values for sageinsure-api
replicaCount: 2

image:
  repository: sageinsureacr.azurecr.io/sageinsure-backend
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations:
    azure.workload.identity/client-id: "e963ea14-9c63-4a32-b455-0b4047604b99"
  # The name of the service account to use.
  name: "sageinsure-api"

podAnnotations:
  azure.workload.identity/use: "true"

podSecurityContext:
  fsGroup: 2000
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 80
  targetPort: 8000
  name: http

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: api-staging.maplesage.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: api-staging-maplesage-com-tls
      hosts:
        - api-staging.maplesage.com

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - sageinsure-api
          topologyKey: kubernetes.io/hostname

# Application configuration
app:
  port: 8000
  environment: production
  logLevel: INFO

# Health check configuration
healthCheck:
  enabled: true
  path: /healthz
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
  successThreshold: 1

readinessProbe:
  enabled: true
  path: /healthz
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1

startupProbe:
  enabled: true
  path: /healthz
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30
  successThreshold: 1

# Azure configuration
azure:
  tenantId: "e9394f90-446d-41dd-8c8c-98ac08c5f090"

# Azure Key Vault integration
keyVault:
  enabled: true
  name: "kv-eedfa81f"
  secrets:
    - name: openai-api-key
      key: AZURE-OPENAI-API-KEY
      envVar: AZURE_OPENAI_API_KEY
    - name: search-api-key
      key: AZURE-SEARCH-API-KEY
      envVar: AZURE_SEARCH_KEY
    - name: storage-account-key
      key: AZURE-STORAGE-ACCOUNT-KEY
      envVar: STORAGE_ACCOUNT_KEY

# Environment variables
env:
  - name: AZURE_SEARCH_ENDPOINT
    value: "https://sageinsure-search.search.windows.net"
  - name: AZURE_OPENAI_ENDPOINT
    value: "https://sageinsure-openai.openai.azure.com"
  - name: AZURE_STORAGE_ACCOUNT_NAME
    value: "policydocseedfa81f"

# Monitoring configuration
monitoring:
  enabled: false
  port: 9090
  path: /metrics

# Service mesh configuration (if using Istio)
serviceMesh:
  enabled: false
