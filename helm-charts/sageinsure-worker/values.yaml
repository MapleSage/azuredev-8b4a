# Default values for sageinsure-worker
image:
  repository: sageinsureacr.azurecr.io/sageinsure-worker
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations:
    azure.workload.identity/client-id: "" # Will be set by Terraform
  # The name of the service account to use.
  name: "sageinsure-worker"

podAnnotations:
  azure.workload.identity/use: "true"

podSecurityContext:
  fsGroup: 2000
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

# Worker deployment configuration
worker:
  enabled: true
  replicaCount: 2
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 512Mi

  # Node targeting for worker pods
  nodeSelector:
    workload: general

  tolerations: []

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - sageinsure-worker
            topologyKey: kubernetes.io/hostname

# Batch job configuration
batchJobs:
  # Document processing job
  documentProcessor:
    enabled: true
    schedule: "0 2 * * *" # Daily at 2 AM
    concurrencyPolicy: Forbid
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 1
    resources:
      limits:
        cpu: 4000m
        memory: 4Gi
      requests:
        cpu: 1000m
        memory: 1Gi
    nodeSelector:
      workload: general

  # Policy analysis job
  policyAnalyzer:
    enabled: true
    schedule: "0 4 * * *" # Daily at 4 AM
    concurrencyPolicy: Forbid
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 1
    resources:
      limits:
        cpu: 2000m
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 512Mi
    nodeSelector:
      workload: general

  # Data cleanup job
  dataCleanup:
    enabled: true
    schedule: "0 1 * * 0" # Weekly on Sunday at 1 AM
    concurrencyPolicy: Forbid
    successfulJobsHistoryLimit: 2
    failedJobsHistoryLimit: 1
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 200m
        memory: 256Mi
    nodeSelector:
      workload: general

# Queue configuration
queue:
  # Redis configuration for job queuing
  redis:
    enabled: true
    host: "redis-master.redis.svc.cluster.local"
    port: 6379
    database: 0

  # Queue worker configuration
  workers:
    high_priority:
      replicas: 2
      resources:
        limits:
          cpu: 1000m
          memory: 1Gi
        requests:
          cpu: 200m
          memory: 256Mi

    normal_priority:
      replicas: 3
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 128Mi

    low_priority:
      replicas: 1
      resources:
        limits:
          cpu: 200m
          memory: 256Mi
        requests:
          cpu: 50m
          memory: 64Mi

# Application configuration
app:
  environment: production
  logLevel: INFO

# Azure Key Vault integration
keyVault:
  enabled: true
  name: "kv-eedfa81f"
  secrets:
    - name: openai-api-key
      key: OPENAI-API-KEY
      envVar: OPENAI_API_KEY
    - name: search-api-key
      key: SEARCH-API-KEY
      envVar: AZURE_SEARCH_API_KEY
    - name: redis-password
      key: REDIS-PASSWORD
      envVar: REDIS_PASSWORD

# Environment variables
env:
  - name: AZURE_SEARCH_ENDPOINT
    value: "https://sageinsure-search.search.windows.net"
  - name: AZURE_OPENAI_ENDPOINT
    value: "https://sageinsure-openai.openai.azure.com"
  - name: AZURE_STORAGE_ACCOUNT_NAME
    value: "policydocseedfa81f"
  - name: WORKER_TYPE
    value: "batch"

# Monitoring configuration
monitoring:
  enabled: true
  port: 9090
  path: /metrics

# Autoscaling for queue workers
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

  # Custom metrics for queue-based scaling
  customMetrics:
    enabled: true
    queueLength:
      threshold: 100
      scaleUpCooldown: 300
      scaleDownCooldown: 600
