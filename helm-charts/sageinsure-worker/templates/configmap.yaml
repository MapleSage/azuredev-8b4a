apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sageinsure-worker.fullname" . }}-config
  labels:
    {{- include "sageinsure-worker.labels" . | nindent 4 }}
data:
  # Application configuration
  APP_NAME: "sageinsure-worker"
  APP_VERSION: "{{ .Chart.AppVersion }}"
  
  # Queue configuration
  {{- if .Values.queue.redis.enabled }}
  REDIS_HOST: "{{ .Values.queue.redis.host }}"
  REDIS_PORT: "{{ .Values.queue.redis.port }}"
  REDIS_DB: "{{ .Values.queue.redis.database }}"
  {{- end }}
  
  # Azure service endpoints
  {{- range .Values.env }}
  {{ .name }}: "{{ .value }}"
  {{- end }}
  
  # Monitoring configuration
  {{- if .Values.monitoring.enabled }}
  METRICS_ENABLED: "true"
  METRICS_PORT: "{{ .Values.monitoring.port }}"
  METRICS_PATH: "{{ .Values.monitoring.path }}"
  {{- end }}