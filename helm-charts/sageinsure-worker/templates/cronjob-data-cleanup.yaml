{{- if .Values.batchJobs.dataCleanup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "sageinsure-worker.fullname" . }}-data-cleanup
  labels:
    {{- include "sageinsure-worker.labels" . | nindent 4 }}
    component: data-cleanup
spec:
  schedule: "{{ .Values.batchJobs.dataCleanup.schedule }}"
  concurrencyPolicy: {{ .Values.batchJobs.dataCleanup.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.batchJobs.dataCleanup.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.batchJobs.dataCleanup.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "sageinsure-worker.selectorLabels" . | nindent 12 }}
            component: data-cleanup
        spec:
          restartPolicy: OnFailure
          serviceAccountName: {{ include "sageinsure-worker.serviceAccountName" . }}
          containers:
            - name: data-cleanup
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
              command: ["python", "-m", "worker.jobs.data_cleanup"]
              env:
                - name: JOB_TYPE
                  value: "data-cleanup"
              resources:
                {{- toYaml .Values.batchJobs.dataCleanup.resources | nindent 16 }}
{{- end }}